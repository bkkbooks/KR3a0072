body:
  text: 讀書分年日程儒家類提要臣等謹案讀書分年日程三卷元程端禮撰端禮字敬叔慶元人㓜頴悟純篤稍長即通六經大義慶元自宋季以來皆尊尚陸九淵之學而朱子之學不行端禮獨從史蒙卿㳺以傳朱子明體達用之指學者及門甚衆官至衢州路教授事蹟具元史儒學傳是書前有延祐二年自序謂一本輔漢卿所萃朱子讀書法修之考朱子讀書法六條一曰居敬持志二曰循序漸進三曰熟讀精思四曰虚心涵泳五曰切己體察六曰著𦂳用力盖毎年月日讀書程限不同而一以朱子六條為綱領考元史本𫝊云所著有讀書工程國子監以頒示郡縣然是書之末有端禮自跋厯序崇徳吳氏平江陸氏池州馮氏及江浙諸處鈔刋各本而不及國子監頒示則元史所云或端禮身後之事歟跋作于元統三年十一月朔考順帝以元統三年十一月辛丑改元至元此標十一月朔則尚在辛丑改元之前故仍稱元統云乾隆四十三年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀讀書分年日程原序今父兄之愛其子弟非不知敎要其有成十不能二三此豈特子弟與其師之過為父兄者自無一定可久之見曾未讀書明理遽使之學文為師者雖明知其未可亦欲以文墨自見不免於阿意曲徇失序無本欲速不達不特文不足以言文而書無一種精熟坐失嵗月悔則已老且始學既差先入為主終身陷於務外為人而不自知弊宜然也孔子之教序志道據徳依仁居游藝之先周禮大司徒列六藝居六徳六行之後本末之序有不可紊者今制取士以徳行為首經術為先詞章次之蓋因之也况今明經一主朱子説使理學與舉業畢貫於一以便志道之士漢唐宋科目所未有也誠千載學者之大幸尚不自知而忍紊之邪嗟夫今士之讀經雖知主朱子説不知讀之固自有法也讀之無法故猶不免以語言文字求之而為程試資也昔胡文定公於程學盛行之時有不絶如綫之嘆竊恐此嘆將復見今日也余不自揆用敢輯為讀書分年日程與朋友共讀以救斯弊蓋一本輔漢卿所粹朱子讀書法修之而先儒之論有禆於此者亦間取一二焉嗟夫欲經之無不治理之無不明治道之無不通制度之無不考古今之無不知文詞之無不達得諸身心者無不可推而為天下國家用竊意守是庶乎本末不遺而工夫有序已得不忘而未能日增玩索精熟而心與理相浹静存動察而身與道為一徳形於言辭而可法可傳於後較其所就豈世俗偏長一曲之學所可同日語哉延祐二年八月鄞程端禮書於池之建徳學欽定四庫全書讀書分年日程卷首元程端禮撰綱領白鹿洞書院教條父子有親君臣有義夫婦有别長幼有序朋友有信右五教之目堯舜使契爲司徒敬敷五教即此是也學者學此而已而其所以學之之序亦有五焉其别如左博學之審問之愼思之明辨之篤行之右爲學之序學問思辨四者皆所以窮理若夫篤行之事則自修身以至處事接物亦各有要其别如左言忠信行篤敬懲忿窒慾遷善改過右修身之要正其誼不謀其利明其道不計其功右處事之要己所不欲勿施於人行有不得反求諸己右接物之要熹竊觀古昔聖賢所以教人爲學之意莫非使之講明義理以修其身然後推以及人非徒欲其務記覽爲詞章以釣聲名取利祿而已今之爲學者則旣反是矣然聖賢所以教人之法具存於經有志之士固當熟讀深思而問辨之茍知其理之當然而責其身以必然則夫規矩禁防之具豈待他人設之而後有所持循哉近世於學有規其待學者爲己淺矣而其爲法又未必古人之意也故今不復施於此堂而特取凡聖賢所以教人爲學之大端條列如右而掲之楣間諸君其相與講明遵守而責之於身焉則夫思慮云爲之際其所以戒謹恐懼者必有嚴於彼者矣其有不然而或出於禁防之外言之所棄則彼所謂規者必將取之固不得而畧也諸君其念之哉程董二先生學則凡學於此者必嚴朔望之儀其日昧爽直日一人主擊板始擊咸起盥潄總櫛衣冠再擊皆著深衣或凉衫升堂師長帥弟子詣先聖像前再拜焚香訖又再拜退師長西南嚮立諸生之長者率以次東北嚮再拜師長立而扶之長者一人前致辭訖又再拜師長入於室諸生以次環立再拜退各就案謹晨昏之令常日擊板如前再擊諸生升堂序立俟師長出戸立定皆揖次分両序相揖而退至夜將寢擊板㑹揖如朝禮㑹講㑹食㑹茶亦擊板如前朝揖㑹講以深衣或凉衫餘以道服褙子居處必恭居有常處序坐以齒凡坐必直身正體毋箕踞傾倚交脛搖足寢必後長者旣寢勿言當晝勿寢步立必正行必徐立必拱必後長者毋背所尊毋踐閾毋跛倚視聽必端毋滛視毋傾聽言語必謹致詳審重然諾肅聲氣毋輕毋誕毋戱謔諠譁毋及鄉里人物長短及市井鄙俚無益之談容貌必莊必端嚴凝重勿輕易放肆勿麄豪狠傲勿輕有喜怒衣冠必整勿爲詭異華靡毋致垢敝簡率雖燕處不得裸袒露頂雖盛暑不得輒去鞋襪飲食必節毋求飽毋貪味食必以時毋恥惡食非節假及尊命不得飲飲不過三爵勿至醉出入必省非尊長呼喚師長使令及已有急幹不得輒出學門出必告反必面出不易方入不踰期讀書必專一必正心肅容計徧數徧數已足而未成誦必須成誦徧數未足雖已成誦必滿徧數一書已熟方讀一書毋務泛觀毋務彊記非聖賢之書勿讀無益之文勿觀寫字必楷敬勿草勿欹傾几案必整齊位置有倫簡帙不亂書笥衣箧必謹扃鑰堂室必潔淨逐日直日再擊板如前以水灑堂上良久以帚掃去塵埃以巾抆拭几案其餘悉令齋僕掃拭之别有穢汚悉令掃除不拘早晩相呼必以齒年長倍者以丈十年長者以兄年相若者以字勿以爾汝書問稱謂亦如之接見必有定凡客請見師坐定直日擊板諸生如其服升堂序揖立侍師長命之退則退若客於諸生中有自欲相見者則見師長畢就其位見之非其類者勿與親狎修業有餘功游藝有適性彈琴習射投壺各有儀矩非時勿弄博奕鄙事不宜親學使人莊以恕而必專所聽擇謹愿勤力者莊以臨之恕以待之有小過者訶之甚則白於師長懲之不悛衆稟師長遣之不許直行已意茍日從事於斯而不敢忽則入德之方庶乎其近矣道不遠人理不外事故古之教者自其能食能言而所以訓導之整齊之者莫不有法而况家塾黨庠術序之間乎彼學者所以入孝出弟謹信羣居終日德進業修而暴慢放肆之氣不設於身體者繇此故也番昜程端䝉與其友生董銖共爲此書將以教其鄉人子弟而作新之蓋有古人小學之遺意矣余以爲凡爲庠序之師者能以是而率其徒則所謂成人有德小子有造者將復見於今日矣於以助夫后王降德之意豈不美哉淳熙丁未十一月甲子新安朱熹書白鹿洞教條乃文公朱先生所集聖賢之成訓而學則者鄉先生程董二公之所爲文公嘗有取焉者也今合二者而並掲之一則舉其學問之宏綱大目而使人之知所用力一則定爲羣居日用之常儀而使人有所持循卽大小學之遺法也學者誠能從事於此則本末相須内外交養而入道之方備矣若夫近世之所謂規者則文公不以施之鹿洞而謂必不得已而後取之故今亦不敢以此列於此云寳佑戊午元日饒魯謹書西山眞先生教子齋規一曰學禮凡爲人要識道理識禮數在家庭事父母入書院事先生並要恭敬順從遵依教誨與之言則應教之事則行毋得怠慢自任己意二曰學坐定身端坐齊脚斂手毋得伏􅀢靠背偃仰傾側三曰學行籠袖徐行毋得掉臂跳足四曰學立拱手正身毋得跛倚欹斜五曰學言樸實語事毋得妄誕低細出聲毋得叫喚六曰學揖低頭屈腰出聲收手毋得輕率慢易七曰學誦專心看字斷句慢讀須要字字分明毋得目視東西手弄他物八曰學書凝志把筆字要齊整圓淨毋得輕易糊塗朱子讀書法居敬持志循序漸進熟讀精思虛心涵泳切己體察著緊用力右詳見輔漢卿所編近已判集慶學斂身正坐緩視㣲吟虛心涵泳切己體察右見朱子讀書法寛著期限緊著課程右見朱子讀書法未熟快讀足徧數已熟緩讀思理趣右古人讀書法朱子記經史閣有曰古之學者無他明德新民求各止於至善而已夫其所明之德所止之善豈有待於外求哉識其在我而敬以存之其亦可矣其所以必曰讀書云者則以天地隂陽事物之理修身事親齊家及國以至於平治天下之道與凡聖賢之言行古今之得失禮樂之名數下至於食貨源流兵刑法制亦莫非吾度内有不可得而精粗者若非考諸載籍之文沉潛參伍以求其故則亦無以明夫明德體用之全而止其至善精㣲之極然自聖學不傳世之爲士者不知學之有本而惟書之讀則其所以求於書不越乎記誦訓詁文詞之間以釣名干祿而已是以天下之書愈多而理愈昧學者之事愈勤而心愈放詞章愈麗議論愈高而其德業事功之實愈無以逮乎古人然非書之罪也讀者不知學之有本而無以爲之地也使二三子者知夫爲學之本有無待於外求者而因以致其操存持守之力使吾方寸之間清明純粹眞有以爲讀書之地而後宏其規宻其度循其先後本末之序以大玩乎閣中之藏則夫天下之理必有以盡其纎悉而一以貫之異時所以措諸事者亦將有本而無窮矣朱子記稽古閣有曰人之有是身也則必有是心有是心也則必有是理若仁義禮智之爲體惻隱羞惡恭敬是非之爲用則人皆有之非繇外鑠我也然聖人之所以教不使學者收視反聽一以反求諸心爲事而必曰興於詩立於禮成於樂又曰博學審問愼思明辨而篤行之何哉蓋理雖在我而或蔽於氣稟物欲之私則不能以自見學雖在外然皆所以講乎此理之實及其浹洽貫通而自得之則又初無内外精粗之間也世變俗衰士不知學挾册讀書者旣不過於誇多鬬靡以爲利祿之計其有意於爲己者又直以爲可以取足於心而無俟於他求也是以墮於佛老空虛之邪見而於義理之正法度之詳有不察焉其幸而或知理之在我與夫學之不可以不講者則又不知循序致詳虛心一意從容以㑹乎在我之本然是以急遽淺迫終不能浹洽而貫通也嗚呼是豈學之果不可爲書之果不可讀而古先聖賢所以垂世立教果無益於後來也哉道之不明可嘆也已朱子上疏曰爲學之道莫先於窮理窮理之要必在於讀書讀書之法莫貴於循序而致精而致精之本則又在於居敬而持志此不易之理也夫天下之事莫不有理爲君臣有君臣之理爲父子有父子之理爲兄弟爲夫婦爲朋友以至出入起居應事接物之際亦莫不各有其理焉窮之則自君臣之大以至事物之微莫不知其所以然與其所當然而亡纎芥之疑善則從之惡則去之而無毫髪之累此爲學所以莫先於窮理也至論天下之理則要妙精微各有攸當亘古亘今不可移易惟古之聖人爲能盡之而其所行所言無不可爲天下後世不易之大法其餘則順之者爲君子而吉背之者爲小人而凶吉之大者則能保四海而可以爲法凶之甚者則不能保其身而可以爲戒是其粲然之迹必然之效蓋莫不具於經訓史策之中欲窮天下之理而不即是以求之則是正牆面而立耳此窮理所以必在於讀書也若夫讀書則其不好之者固怠忽間斷而無所成矣其好之者又不免乎貪多而務廣徃徃未啟其端而遽已欲探其終未究乎此而忽已志在乎彼是以雖復終日勤勞不得休息而意緒匆匆常若有所奔走迫逐而無從容涵泳之樂是又安能深信自得常久不厭以異於彼之怠忽間斷而無所成者哉孔子所謂欲速則不達孟子所謂進鋭退速正謂此也誠能監此而有以反之則心潛於一久而不移而所讀之書文意接連血脉通貫自然漸漬浹洽心與理㑹而善之爲勸者深惡之爲戒者切矣此循序致精所以爲讀書之法也若夫致精之本則在於心而心之爲物至虛至靈神妙不測常爲一身之主以提萬事之綱而不可有頃刻之不存者也一不自覺而馳騖飛揚以徇物慾於軀殻之外則一身無主萬事無綱雖其俯仰顧盼之間蓋已不自覺其身之所在而况能反覆聖賢參考事物以求義理至當之歸乎孔子所謂君子不重則不威學則不固孟子所謂學問之道無他求其放心而已矣者正謂此也誠能嚴恭寅畏常存此心使其終日儼然不爲物欲之所侵亂則以之讀書以之觀理將無往而不通以之應事以之接物將無所處而不當矣此居敬持志所以爲讀書之本也皆愚臣平生爲學艱難辛苦已試之效竊意聖賢復生所以教人不過如此蓋雖帝王之學殆亦無以易之朱子答汪尚書書曰近世言道學者失於太高讀書講義率常以徑易超絶不歴階梯爲快而於其間曲折精微正好玩索處每皆忽畧厭棄以爲卑近瑣屑不足留情以故雖或多聞博識之士其於天下之義理亦不能無所未盡曷若循下學上達之序日講夜思躬行力究寜煩毋畧寧下毋高寧淺毋深寧拙毋巧從容潛玩存久漸明衆理洞然次第無隱然後知夫大中至正之極天理人事之全無不在是初無迥然超絶不可及者而幾微之間毫釐畢察酬酢之際體用渾然雖或使之任至重而處所難亦沛然行其所無事而已朱子答呂子約書曰夫學者旣學聖人則當以聖人之教爲主今六經語孟中庸大學之書具在彼以了悟爲高者旣病其障礙而以爲不可讀此以記覽爲重者又病其狹小而以爲不足觀如是則是聖人之所以立言垂訓者徒足以悮人而不足以開人孔子不賢於堯舜而達摩賢於仲尼矣無乃悖之甚耶朱子答劉定夫書曰學者息却許多狂妄身心除却許多閒雜說話著實讀書初時儘且尋行數墨久久自有見處最怕人說學不在書不務佔畢不專口耳下梢說得張皇都無收拾只是一塲脫空直是可惡朱子曰爲學須是已分上做工夫有本領方不作言語說若無存飬儘說得明自成兩片亦不濟事况未必說得明乎要須發憤忘食痛切去做身分上工夫莫荏苒嵗月可惜也朱子曰某之講學所以異於科舉之文正是要切己行之若只恁地說過依舊不濟事若實是把做工夫只是敬以直内義以方外八字一生用之不盡又曰某近覺得學者所以不成箇頭項者只緣聖賢說得多了旣欲爲此又欲爲彼如說敬以直内義以方外若實下工夫見得眞箇是敬立則内直義形而外方這終身可以受用今人却似見得這兩句好又見說克己復禮也好又見說出門如賔也好空多了流戀却不把捉得一項周全李貫之曰敬能集義義不離敬敬不容不義義不容不敬敬義夾持則心常存心存則心熟而智益明敬義二字該盡六經語孟中所言之理朱子論孟集義序曰論孟之書學者所以求道之至要古今爲之說者蓋已百有餘家然自秦漢以來儒者類皆不足以與聞斯道之傳其溺於卑近者旣得其言而不得其意其騖於高逺者則又支離踳駮或乃幷其言而失之學者益以病焉宋興百年河洛之間有二程先生者出然後斯道之傳有繼其於孔子孟氏之心蓋異世而同符也故其所以發明二書之說言雖近而索之無窮指雖遠而操之有要使夫讀者非徒可以得其言而又可以得其意非徒可以得其意而又可以幷其所以進於此者而得之其所以興起斯文開悟後學可謂至矣閒嘗蒐輯條疏以附於本章之次旣又取夫學之有同於先生者與其有得於先生者若横渠張公若范氏名祖禹字淳夫二呂氏希哲字原明大臨字與叔謝氏良佐字顯道游氏酢字定夫楊氏時字中立侯氏仲良字師聖尹氏焞字彦明凡九家之說以附益之名曰論孟精義以備觀省而同志之士有欲從事於此者亦不隱焉抑嘗論之論語之書無所不包而其所以示人者莫非操存涵養之要七篇之指無所不究而其所以示人者類皆體驗充擴之端夫聖賢之分其不同固如此然而體用一源也顯微無間也是則非夫先生之學之至其孰能知之嗚呼兹其所以奮乎百世絶學之後而獨得夫千載不傳之傳也歟若張公之於先生如横渠之于二程論其所至竊意其猶伯夷伊尹之於孔子而一時及門之士考其言行則又未知其孰可以爲孔氏之顔曾今録其言非敢以爲無少異於先生而悉合乎聖賢之意亦曰大者旣同則其淺深疎宻毫釐之間正學者所宜盡心耳至於近嵗以來學於先生之門人者又或出其書焉則意其源遠末分醇醨異味而不敢載矣或曰凡說之行於世而不列於此者皆無取已乎曰不然也漢魏諸儒正音讀通訓詁考制度辨名物其功博矣學者茍不先涉其流則亦何以用力於此而近世一二名家與夫所謂學于先生之門人者其考證推說亦或時有補于文義之間學者有得於此而後觀焉則亦何適而無得哉特所以求夫聖賢之意者則在此而不在彼爾若夫外自託于程氏而竊其近似之言以文其異端之說者則誠不可以入于學者之心然以其荒幻浮誇足以欺世也而流俗頗已歸鄉之矣其爲害豈淺淺哉顧其語言氣象之間則實有不難辨者學者誠用力於此書而有得焉則於其言雖欲讀之亦且有所不暇矣然則是書之作其率爾之誚雖不敢辭至於明聖傳之統采衆說之長折流俗之謬則竊亦妄意其庶幾焉朱子作論語訓䝉後更名集註序曰余旣序次論語精義以備觀覽暇日又爲兒輩論之大抵諸老先生之爲說非本爲童子設也故其訓詁畧而義理詳初學者讀之經之文句未能自通又當徧求誦說問其指意茫然迷眩殆非啟䝉之要因爲删錄以成此書本之註疏以通其訓詁參之釋文以正其音讀然後㑹之於諸先生之說以發其精微一句之義繫之本句之下一章之旨列之本章之左以平生所聞於師友而得於心思者間附一二條焉本末精粗大小詳畧無敢偏廢也然本其所以作取便於童子之習而已故名曰集註詳說蓋將藏之家塾俾兒軰學非敢爲他人發也嗚呼小子來前予幼獲父師之訓從事於此三十餘年材資不敏未能有得今乃妄意採摭先儒有所取舎度德量力夫豈所宜然施之汝曹取其易曉以是庶幾其可幸無罪焉耳夫其訓詁之詳且明也日講焉則無不通矣義理之精且約也日誦焉則無不識矣通者已知而時習識者未解而勿忘予之始學亦若斯而已矣嗚呼其小子懋戒之哉汲汲焉而毋欲速也循循焉而毋敢惰也毋牽於俗學而絶之以爲迂且淡也毋惑於異端而獵之以爲近且卑也聖人之書大中至正之極而萬世之標凖也古之學者其始即此以爲學其卒非離此以爲道窮理盡性修身齊家推以及人内外一致蓋取諸此而無所不備亦修吾身而已矣舎而他求夫豈無可觀者然致遠恐泥昔者吾幾陷焉今幸自脫故不願汝曹之爲之也嗚呼小子其懋敬之朱子曰主敬致知摧驕破吝謹之於細微雜亂之域而養之於虛閒靜一之中右朱子送門人李伯諫教授蘄學之訓上文云與伯諫游而講於斯也亦三年矣凡持守之要玩索之端巨細精粗蓋已無所不論今使之言其又何以加此然有一焉云云是則雖屢言之而豈患乎瀆哉朱子日用自警詩云圓融無際大無餘卽此身心是太虛不向用時勤猛省却於何處味眞腴尋常應對尤須謹造次施爲莫放疎一日洞然無别體方知不枉費工夫先師果齋史先生每教學者必首以此篇使之揭於座右曰學問進修之大端其畧有四一曰尚志二曰居敬三曰窮理四曰反身大抵爲士莫先於尚志孔子曰吾十有五而志於學孟子曰士何事曰尚志仁義而已矣程子亦曰言學便當以道為志言人便當以聖為志茍此志不立而惟流俗之徇利欲之趨則終身墮於卑陋而不足與詣高明光大之域矣何足以為士哉此志旣立便當居敬以涵養其本原蓋人心虛靈天理具足仁義禮智皆吾固有聖賢之所以為聖賢者非自外而得之也茍能端莊靜一以涵養之則志氣清明義理昭著而人欲自然退聽以此窮理理必明以此反身身必誠乃學問之本原也夫旣知涵養其本原則天理之全體固渾然於吾心矣然一心之中雖曰萬理咸具天叙天秩品節粲然茍非稽之聖賢講之師友察之事物驗之身心以究析其精微之極至則知有所蔽而行必有所差此大學之誠意正心修身所以必先格物致知中庸之篤行所以必先博學審問愼思明辨也旣知所以窮理矣則必以其所窮之理反之於身以踐其實日用之間微而念慮著而云為其當然者皆天理之公其不當然者皆人欲之私也於此謹而察之果當然乎則充之惟恐其不廣行之唯恐其不至果不當然乎則改之惟恐其不速去之唯恐其不盡從事於斯無少間㫁則人欲日以消冺天理日以純熟而聖賢之道忽不自知其實有於我矣窮則獨善其身可以繼往聖而開來學達則兼善天下可以參天地而贊化育其功用有不可勝窮者若夫趨向卑陋而此志不立持養疎畧而此心不存講學之功不加而所知者昏蔽反身之誠不篤而所行者悖戾將見人欲愈熾天理愈微本心一亡亦將何所不至哉書曰惟聖㒺念作狂惟狂克念作聖聖狂之分特在念不念之間而已矣倂惟同志勉之此本雙峯饒氏之訓果齋先生名䝉卿字景正鄞人早師常德小陽先生名岊號字溪大陽先生名枋號存齋陽先生師涪陵㬊先生名淵字亞夫㬊先生師朱子讀書分年日程巻首
