  - {type: page-break, offset: 0, content: '', id: KR3a0072_WYG_003-1a, image: WYG0709/WYG0709-0498a.png}
body:
  text: 讀書分年日程卷三元程端禮撰正始之音序夫載道傳世書之功大矣書有六義其來已久葢自蒼頡始制文字雖㸃畫偏傍之微有精義入神之妙有自然布置之宜後人推之以為有象形指事㑹意諧聲轉注假借六者之别雖分千衍萬要不越此夫象形者寫其跡也指事者推其義也㑹意者合其形而兼乎義者也諧聲者合其聲以附乎形也轉注者形之變也假借者聲之變也學者精辨乎此則古今文字若網之在綱有條而不紊矣是以古之小學之教自十嵗則教之書計而大司徒之屬有保氏者所以誘掖夫未成之材而教之道藝者六書居其一焉葢將使之自末以窮本繇藝以達道因小學之流泝乎大學之源小而習之終其身而不厭古人於六書之義其重若此蒼頡而下至周宣王時有史籀者演暢古文著為大篆漢志謂為周人教學童之書雖時與古文少異而六義初未失也自秦斯軰省改古籀約為小篆而古文浸微獄吏程邈欲趨約易變為𨽻體而籀篆亦廢又有草書者日趨簡便而六義亦幾乎絶漢人猶稍知尊崇字學尉律試吏者課以八體而必使諷籀至九千字以上吏民上書或劾其不正者然而古法既變雜體紛然非復蒼史之舊其後揚雄之訓纂相如之凡將史游之急就以致甄豐之改定古文是雖有意於存古要皆畧而不備及後漢和安時許慎受學賈逵廼始兼采史籀雄斯作説文解字萬六百有餘上之其書詳博最為近古然𨽻學行之既久行草八分雜然並出視史籀反為竒怪鍾王而降真草爭妍顧野王廣益説文為玉篇始從其楷孫愐増加陸法言切韻更為唐韻説文雖存而學之者鮮矣逮大厯中李陽冰始尚説文修正筆法自謂篆籀中興然時持臆説排斥許氏識者謂其筆力雖殊絶而古體益壊歴考古今紛紛異尚固無以加於説文也然叔重止得象形諧聲二義而其餘復畧且病於子母之混淆國初詔徐鉉校定説文雖曰不遺六書之體然大畧亦得二義而已但説文無翻切鉉始取孫愐音切附益之大中祥符有詔刋正玉篇廣韻而説文復衰又有丁度集韻司馬類篇之屬其名不一或訓或釋或證或辨至王安石字説作而又一以㑹意解之固未有全六義者也玉篇類形不類聲廣韻類聲不類形大抵形尚可考而聲為難工葢形有定而聲無窮也類形者少類聲者多類聲雖多而未有正其始音之的者世革風移轉相假借方音清濁譌變因乘甚矣始音之難知也栢知學最晩小學工夫固大缺畧諸經雖多釋音每病始音之未明既而求於説文又病従聲之難曉一日以説文翻為楷字又得李文簡燾類韻之編部叙雖非叔重之舊然亦頗便於討閲既而又得夾漈鄭公樵所著六書畧一篇喜不釋手葢其訂覈精整六義粲然一掃千古之陋而於假借一門始音之義亦備故獨取以附於説文翻楷之後又得賈昌朝羣經音辨取其三辨之詳説徐音賈辨鄭畧微有異同互相補發按古證今訂譌正誤以之讀聖賢之書於音義亦庶幾焉今合而一之名曰正始之音嗚呼昔沈約以郊居賦示王筠讀至雌霓入聲撫掌笑曰僕常恐人呼為五雞反遂以為知音以霓字従雨従兒義合諧聲固當讀為五雞反烏在其為知音哉韓昌黎鄙爾雅謂非磊落人爾雅固未為盡善是亦學之一端而遽鄙之過矣而况後世自兒已習為進取捷徑之學固視此為迂也迂非栢所敢避但自念日月斯邁於六藝始求其一而未究其藴方自笑其茍焉耳因併識其編鈔之嵗月云端平丙申秋仲晦王栢書字音清濁辨賈昌朝譔王于方切君也于放切君有天下也子將此切男女通稱將吏切子育下民女尼吕切女未嫁稱尼据切以女嫁人妻七奚切與夫齊者七計切以女適人親七鄰切婣也七吝切婚婣相㑹賓必鄰切客也必吝切客以禮㑹衣于希切身章也于既切施諸身冠古桓切首服古玩切加諸首枕章荏切藉首木章鴆切首在木飲于錦切酒漿于禁切所以歠麾許為切旌旗許類切所以使人冰筆凌切水凝彼凭切所以寒物膏古刀切脂凝古到切所以潤物文無分切采章亡運切所以飾物粉夫吻切白飾夫問切所以傅物巾居銀切帨也居吝切所以飾物薰許云切烟出也許運切所以薧物隂于金切氣之濁也于禁切所以庇物采倉宰切取也倉代切所以取食輕去盈切浮也對重苦政切所以自用兩力奬切偶數力讓切物相偶三蘇甘切竒數蘇暫切審用其數左臧可切左手對右臧箇切左右助之右云久切右手對左尤救切左右助之先思天切前也對後思見切前之卑補支切下對髙部止切下之逺兩阮切疏對近于眷切疏之離力支切兩也力智切兩之傍蒲郎切近也蒲浪切近之空苦紅切虛也苦貢切虛之沈直金切没也對浮直禁切沈之重直龍切再也直用切再之數色主切計之也色句切計有多少量龍張切酌之也龍向切酌有大小度徒洛切約也徒故切約有長短髙古刀切崇也古到切度髙幾許深式金切下也式禁切測深幾許長持良切永也對短持亮切揆長幾許廣古黨切濶也對狹古曠切量廣幾許染而琰切濡也而豔切既濡折之舌切屈也市列切既屈别彼列切辨也皮列切既辨貫古桓切穿也古玩切既穿縫符容切紩也符用切既紩過古禾切逾也古卧切既逾斷都管切絶也徒管切既絶盡即忍切極也慈忍切既極分方云切别也扶問切既别解古買切釋也胡買切既釋行户庚切履也下孟切履迹施式支切行也式豉切行惠相息良切共也息亮切共助從疾容切隨也秦用切隨後走臧茍切趨也臧候切趨向奔逋昆切趨也逋悶切趨後散蘇亶切分也蘇岸切分布還胡闗切回也胡患切回遶和户戈切調也胡卧切調絮調徒聊切和也徒料切和適凝魚凌切結也牛證切凝固彊其良切堅也其亮切堅固齊徂奚切等也在計切等平延余然切長也余見切長引著陟畧切置也直畧切置定㝠弭經切暗也弭定切暗甚塵池珍切土也直吝切土汚煎子仙切烹也子賤切烹久炙之石切炮也之夜切炮肉收式周切斂也式救切斂之斂力檢切收也力劍切收聚陳池珍切列也直刃切成列呼火呉切聲也火故切大聲悔呼罪切過也呼内切改過如人諸切似也而預切審似應于陵切當也于證切相當當都郎切宜也都浪切得宜帥所律切總也所類切總人將即良切持也即亮切持衆監古銜切莅也古陷切莅事者使疏士切命也疏事切將命者援于元切引也于眷切引者障之良切壅也之亮切壅者防符方切禦也符况切禦者任如林切堪也如禁切堪其任中陟弓切任也陟仲切任得宜閒古閑切中也古莧切厠其中足子六切止也子預切益而止勝識烝切舉也詩證切舉之克觀古完切視也古玩切謂視號胡刀切呼也胡到切謂呼爭側莖切鬭也側迸切謂鬭迎魚京切逆也魚映切謂逆攻古紅切伐也古送切謂伐守式帚切保也式救切謂保選思兖切擇也思絹切謂擇聽他丁切聆也他定切聆謂之禁居吟切制也居䕃切制謂之知張離切識别也張義切識謂之思息兹切慮度也息吏切慮謂之評蒲兵切訂也蒲柄切訂語謂之論魯昆切説也魯困切説言謂之便蒲連切欲也蒲練切得所欲謂之好呼皓切善也呼到切向所善謂之惡烏各切否也烏路切心所否謂之喜虛巳切悦也虛記切情所悦謂之怨于元切尤之也紆愿切意有所尤謂之操七刀切持之也七到切志有所持謂之語仰舉切言也牛据切以言告之謂之令力丁切使也力政切所使之言謂之教古肴切使也古􅍿切所使之言謂之雨王矩切天澤也王遇切雨自上下種之隴切五榖也之用切謂播種宿思六切止也思宥切日星所止舍生所庚切育也色慶切謂育子乳耳主切生子也而遇切謂飼子吹昌垂切呴也尺偽切謂呴氣烝章升切氣噓也之勝切謂氣噓而澤經古靈切東西也古定切東西其緯縁羊專切循也羊絹切循飾其傍編補年切次也步典切謂所列次封甫容切授爵土也甫用切謂所受爵土也載作代切舟車以致物昨代切謂所致物張陟良切陳也陟亮切謂所陳事藏徂郎切入也徂浪切謂物所入處昌吕切居也昌據切謂所居爨七耑切炊也七亂切謂所炊處柱知庾切支也直主切謂所支木乘食陵切登車也食證切謂其車也卷居兖切曲也居戀切謂曲者祝之六切祭主贊詞者之切謂贊詞要伊消切約也于笑切謂約書傳直專切授也直戀切記所授名綿并切目也綿政切目諸物首畜九切頭也書救切頭所嚮蹄杜奚切獸足也大計切足相躗始式氏切初也對終之稱式志切緩言有初聞亡分切聆聲也亡運切聲著於外稱尺烝切舉也尺證切舉事得宜譽羊諸切稱也羊洳切稱名當體平蒲兵切均也蒲柄切品物定法治直基切理也直吏切致理成功衷陟弓切中也陟仲切處事用中裁音才制也音在體制合宜勞力刀切勩也力到切賞勩勸功興虚凌切舉也許應切舉物寓意累力水切連也力偽切牽連而敗與羊主切授也余慮切授而共之比畀履切近也毗志切近而親之難乃干切艱也乃旦切動而有所艱繫古詣切屬也胡計切屬而有所著為于媯切造也于偽切造而有所徇遲直尼切緩也直利切緩而有所待妨敷芒切㚄也芳亮切置而有所㚄屬章玉切聨也時玉切聨而有所係享呼兩切獻也呼亮切神受其獻棺古桓切柩也古患切以棺斂緘古咸切束也古陷切齊謂棺束含胡南切實口中也胡紺切謂口實遣苦演切送也苦傳切送終之物引以忍切曳也余忍切曵車之紼臨良尋切莅也力禁切哭而莅喪彼此異音辨假古雅切取於人也古訝切與之借子亦切取於人也子夜切與之乞去訖切取於人也去既切與之貸他得切取於人也他代切與之壊音怪毁之户怪切自毁敗音拜毁之薄邁切自毁毁許委切壊他况偽切自壊風方戎切上化下方鳯切下刺上見古甸切上臨下又視之胡甸切下朝上又示之告古禄切下白上古報切上布下養餘兩切上育下餘亮切下奉上共九容切上賦下九用切下奉上遺以追切有所亡羊季切有所與施式支切設之羊至切及之更古衡切因故而改古孟切捨故而作去羌與切除之丘倨切自離畜勅六切聚謂之許六切養謂之喪息郎切死亡也息浪切失亡也忘無方切意遺無放切意昏巧苦絞切善功苦教切偽功恐丘隴切懼之急丘用切緩也還音旋又音全復之速户關切緩也射神亦切命中也神夜切以禮也取七與切制師従己七句切屈己事師仰魚亮切上委下語兩切下瞻上大徒葢切凡廣也他葢切其極也少施沼切凡微也施詔切其降也焉因肩切何也常居語辭于乾切已也常居語末㑹胡沛切相合吉内切聚合披鋪卑切開謂之鋪彼切分謂之播補我切揚謂之補過切布謂之降古巷切下謂之户江切伏謂之覆甫六切傾也敷救切葢也樂五角切聲和也力各切志和也朝陟遙切旦日也直遙切旦見也食時力切餐謂之音寺餉謂之涕他禮虜啟二切又音弟目汁也他計切鼻汁也刺七亦切剚謂之七賜切傷謂之奉扶勇切承也音捧拱也父音甫人之美稱扶雨切家之尊稱被音披著謂之平義切覆謂之合古盍切牽和也胡閤切自和也字音疑混辨上時亮切居髙定體時掌切自下而升下胡賈切居卑定體胡嫁切自上而降夏胡賈切四方廣大胡嫁切萬物盛大後胡茍切居其後胡垢切従其後近巨穩切相隣也巨刃切相親也被部委切所以覆者部偽切所以覆之右在字后字坐字聚字若此類字書皆有上去二聲雖為疑混而釋文義無他别不復載之假借序夾漈鄭樵六書之難明者為假借之難明也六書無傳惟藉説文然許氏惟得象形諧聲二書以成書牽於㑹意復為假借所擾故所得者亦不能守焉學者之患在於識有義之義而不識無義之義假借者無義之義也假借者本非已有因他所授故於已為無義然就假借而言之有有義之假借有無義之假借不可不别也曰同音借義曰協音借義曰因義借音曰因借而借此為有義之假借曰借同音不借義曰借協音不借義曰語辭之借曰五音之借曰三詩之借曰十日之借曰十二辰之借曰方言之借此為無義之假借先儒所以顛沛沉淪經籍之中如汎一葦於溟渤靡所底止皆為假借之所魅也嗚呼六書明則六經如指諸掌假借明則六書如指掌同音借義初裁衣之始而為凡物之始基築土之本而為凡物之本始女子之初而為凡物之初本木之基而為凡物之基小水之㣲也凡微者皆言小永水之長也凡長者皆言永牛為牝牡而牝牡通於畜獸佳為雌雄而雌雄通於鳥雀狀本犬之形而為凡物之狀物本牛之事而為凡事之物駕馬言駕凡驅乘皆曰駕牧牛言牧凡豢養皆曰牧落木曰落而為墮落之落零雨曰零而為飄零之零英本英華之英而為飾物之英苦本苦良之苦而為滋味之苦蔓本藤蔓之蔓而為蔓衍之蔓爻乃交疏之爻而為爻象之爻希乃疎巾之希而為希少之希柞本柞木之柞而為芟柞之柞鑿本金鑿之鑿而為疏鑿之鑿旋反旋也而為回旋之旋戲兵交也而為嬉戲之戲平气之平也而為均平之平封爵土之封也而為封殖之封戚斧也而為親戚之戚塵土也而為塵積之塵賢多材也而為賢良之賢妃嘉偶也而為后妃之妃純絲也而為純全之純茸草也而為尨茸之茸珣夷玉也而玉器亦謂之珣蘆葦也而薺根亦謂之蘆饒食之餘也而為饒衍之饒約絲之束也而為儉約之約凡此之類並同音借義者也右三十五借同音不借義汝水也而為爾汝之汝爾花盛也詩彼爾維何維常之華而為爾汝之爾示旗也而為神示之示業大版也而為事業之業牢牢圏也而為牢固之牢畜田畜也而為畜聚之畜它蛇屬也而為它人之它蚤虱類也而為蚤夜之蚤為母猴也而為作為之為率鳥畢也而為率循之率來麥也而為來往之來易蟲屬也而為變易之易能熊類也而為賢能之能黽鼃也而為黽勉之黽翁毛也而為翁老之翁題頟也而為題名之題薄本林薄之薄而為凉薄之薄茀本茀茂之茀而為茀禄之茀登豆也而為升登之登干盾也而為干犯之干革皮也而為更革之革鞠革囊也而為鞠養之鞠難禽也而為難易之難雍禽也而為雍和之雍溱水也而為室家溱溱之溱棣栘也而為威儀棣棣之棣丁當也而為椓之丁丁之丁薨卒也而為度之薨薨之薨胥蟹醢也而為相胥之胥方並舟也而為方所之方節竹目也而為節操之節管竹筩也而為主管之管韋相違也而為皮韋之韋貿相易也而為眛矇之貿禮貿貿然來休憩也而為休美之休財貨也而為財成之財易財成天地之道齎財之齎而為齎咨之齎易齎咨涕洟時辰之時而為時是之時晉光明也而為晉國之晉夢寐也而為雲夢之夢風䖝之風而為吹嘘之風字養之字而為文字之字勿州里之旗也而為勿不之勿出花英也而為出入之出久距也而為久逺之久凡此之類並同音不借義者也右四十五協音借義旁之為去聲中之為去聲上之為時掌切下之為胡嫁切分之為去聲少之為去聲歸之為音饋遺之為惟季切與也御之為迓為禦行之為下孟切户浪切數色主切之為尸故切色角切趨之為七六切側九切春秋傳賔將趨鄭康成讀咽之為音燕又一結切蕃音蕃樊也之為音煩蕪之為亡甫切徹通也之為直列切斂之為去聲蔓藤也之為莫于切蔓菁吹之為去聲呼之為去聲又呼賀切春秋傳呼役夫噍才笑切嚼也之為音焦禮志微噍殺之音又子流切禮燕雀啁噍之頃否之為音鄙臧否部鄙切否泰喧之為上聲詩云赫兮喧兮趣之為平聲又七口切周官有趣馬幾居希切之為音冀春秋傳庸可幾乎又渠希切近也樂之為五教切又音洛華今作花之為音譁榮也又去聲聚也酇作管切聚也之為音贊南陽縣名在河切沛縣名空之為音孔窟也又苦貢切詩不宜空我師放之為上聲従之為才用切又七容切従容閒暇也比毗至切之為音皮和也上聲方也蒲必切次也音芘朋也敖音遨之為音傲背脊也之為音佩違也衡横木之為音横筍之為私閏切筍輿也塞之為去聲塞垣竒之為居宜切竒偶嘉之為户嫁切春秋傳公賦嘉樂枝之為音岐裁之為音在築也回古文雷字之為亦作迴繞也暴步卜切灼也之為去聲虐也粢稷屬之為才細切禮粢醍在堂元音咨鹽之為去聲定之為丁佞切詩定之方中仰之為去聲并之為去聲伏之為去聲禮羽者嫗伏毛者孕育禆補之切之為婢支切副也厭之為去聲辟必益切君也之為蒲益切法也覺之為古孝切夢覺也騶之為仕救切麗之為力之切詩云魚麗於罶靡之為平聲閒之為去聲援之為平聲引也折之列切之為士列切女之為尼句切妻之為去聲姓之為音生春秋傳蔡公孫歸姓孫之為音遜純之為之尹切縁也總之為子公切詩素絲五總織之為雙吏切徽也詩織文鳥章土之為音杜詩徹彼桑土壊之為音怪錢之為上聲詩痔乃錢鎛鍼音針之為其兼切親之為去聲婚婣相謂賓之為去聲客以禮㑹曰賓衣之為去聲冠之為去聲枕之為去聲飲之為去聲食之為時吏切膏之為㫖到切詩羔裘如膏熏之為去聲隂之為去聲輕之為去聲春秋傳戎輕而不整離之為去聲兩之為去聲詩葛屨五兩沈之為去聲量之為去聲三之為去聲論語三思而後行左上聲之為音佐右上聲之為音佑先之為去聲後之為去聲逺之為去聲近之為去聲復之為扶又切重平聲之為去聲度之為徒洛切長之為去聲廣之為去聲染之為去聲縫之為去聲别彼列切之為皮列切斷都管切之為徒管切盡即忍切之為慈忍切解之為胡買切通也相之為息亮切走之為去聲書矧咸奔走奔之為逋悶切散之為去聲和之為去聲凝之為去聲冰之為彼凭切彊之為其亮切箸之為陟畧切直畧切施之為式豉切以豉切㝠之為去聲煎之為去聲炙之為之夜切收之為式救切當之為去聲悔之為去聲應平聲之為去聲帥之為所類切監之為去聲使之為去聲守之為去聲任之為平聲勝之為平聲爭之為去聲迎之為去聲選之為去聲聽之為平聲論之為平聲知之為音智思之為去聲便之為平聲好之為去聲令之為平聲教之為平聲語之為去聲怨之為平聲衆之為平聲雨之為去聲種之為去聲縁之為去聲張之為去聲藏之為去聲處之為去聲乘之為去聲卷之為上聲祝之為之又切傳之為去聲聞之為去聲稱之為平聲譽之為平聲勞之為去聲興之為去聲與之為去聲繫之為古詣切遲之為去聲屬之為章玉切含之為去聲遣之為去聲禮冇遣奠引以忍切之為余刃切臨之為去聲假之為古訝切春秋不以禮假人借之為入聲貸之為入聲敗之為音拜見之為胡甸切告之為古禄切禮出必告養之為去聲共之為音恭去之為上聲喪之為去聲忘之為去聲恐之為丘用切射之為食亦切取之為七句切禮聞取於人大之為音泰焉之為於乾切㑹之為音檜披之為上聲降之為户江切覆之為甫六切朝之為直遙切刺之為入聲奉之為音捧父扶雨切之為音甫子之為將吏切禮子庶民也凡此之類並協音而借義者也右二百八借協音不借義荷之為胡可切負也茹茹藘切茅蒐也之為去聲度也鮮之為上聲少也燕之為平聲薄之為必各切迫也菑側其切田也之為音災苴七余切麻也之為子余切苞苴竟之為音境旁之為補彭切詩四介旁旁屯之為徒門切莫音暮之為模各切又音陌春秋傳德正應和曰莫个之為音介副也禮明堂左右个又三音幹禮梓人為侯上兩个與其身召之為音邵番附袁切獸足之為音翻次也音波番番勇也句之為古侯切又古候切詩敦弓既句台音怡我也之為音胎星名又音臺春秋季孫宿救台范寗讀咽之為音淵詩伐鼓咽咽調之為徒弔切品調又陟留切詩云惄如調饑登之為音得春秋登來正音征射侯之正也之為去聲邪琅邪地名之為邪正之邪追之為丁回切追琢也徼古堯切之為古弔切邉徼訏之為栩詩川澤訏訏説之為音悦識之為音志信之為音伸樊之為音盤樊纓革之為紀力切急也殺之為去聲降殺占之為去聲甫之為音圃甫田省昔井切之為所景切雅今作鴉之為上聲瞿九遇切驚也之為平聲㦸類鳥之為音島脩脯也之為音卣中尊肺之為音沛詩其葉肺肺脱之為音退詩舒而脱脱兮創音瘡傷也之為去聲予之為音與委之為于偽切委積女之為音汝削之為音肖刀室箾音簫之為音朔象箾以舞簿蠶曲之為簿書平之為辨年切盛音成之為去聲索之為生革切稽之為音啓稽首鄉之為音嚮昭之為音韶游之為音流也旌旗之旒旋之為音選鍾縣盟之為音孟盟津貫之為古也患切習栗之為音裂菑栗也齊之為音咨齊衰冒之為莫比切貪也俾之為普計切俾倪北音佩之為入聲方也屏之為上聲兄之為怳詩倉兄填兮弁之為蒲官切詩小弁縣平聲之為去聲驕之為許喬切詩載獫歇驕薦之為音荐詩天方薦瘥麇也之為丘隕切衆也扃之為上聲春秋我心扃扃閒之為音閑耿工迥切光也之為古幸切耿耿憂也拒之為音矩招拒白帝振之為平聲詩振振公子揖之為子入切詩螽斯羽揖揖兮蟄之為尺十切詩宜爾子孫蟄蟄兮紀之為起詩有紀冇堂縱之為平聲絮之為敕慮切禮毋絮羹繆之為音穆諡也絀音屈之為音拙軒之為音憲禮野豕為軒隊之為音墜斤之為紀覲切斤斤明也險之為音儉春秋傳險而易行舍之為音捨王於况切之為平聲宿之為思宥切星也要之為去聲風之為音諷夏胡賈切中夏也之為胡嫁切冬夏也鞠毬也之為音麴又音芎鞠藭卷之為音衮禮三公一命卷又音拳禮執女手之卷然又起權切冠武也鬻亦作粥之為音育賣也居六切詩鬻子之閔斯殿音奠之為丁見切又音店詩民之方殿屎將之為去聲又七羊切詩將仲子敦之為都隊切玉敦又都回切詩敦彼獨宿徒本切渾敦肉之為而救切禮寛裕肉好之音而注切豐肉而短膴㐫武切大臠之為亡古切詩則無膴仕音膜詩民雖靡膴從之為則庸切従衡七容切従容又音縱又音總禮爾無従従爾耆之為音嗜又音底衰衰絰之為楚危切等衰又衰微貉之為音陌狄也又音禡辟必益切君也之為音避又音弭止也又音禆禮素帯終辟又音僻禮負劍辟咡厭于鹽切之為于葉切詩厭浥行露又音壓禮死而不弔曰厭於驗切服也率捕鳥之具之為將帥之帥亦作率又音律約也凡此之類並協音不借義者也右一百三十三因義借音琢本琢玉之琢而為大圭不琢之琢音篆輅本車輅之輅而為狂狡輅鄭人之輅音迓惡以有惡也故可惡去聲内以其内也故可内音納佚夷質切縱也而為佚宕之佚音迭伯長也而為伯王之伯音霸幬長也而為覆幬之幬音燾春秋傳如天之無不幬幕帷也而為幕覆之幕音覓蓼本紅蓼之蓼而為蓼彼蕭斯之蓼力竹切錞本金錞之錞音淳而為厹矛沃錞之錞徒對切術邑中道也以其所行故為鄉術之術音遂嬴秦姓也以其所居故為嬴水之嬴音盈嘯嘯呼之嘯而為指嘯之嘯音叱跛跛躃之跛彼我切而為跛倚之跛彼義切副普逼切剖也而為副貳之副承奉也而為賻承之承音贈甄吉然切本甄陶之甄而為聲甄之甄音震禮薄聲甄封本封土之封而為封棺之封音窆禮縣棺而封齊本齊一之齊而為齊莊之齊側皆切巡本巡行之巡而為逡巡之巡音縁禮終始相巡推本推與之推而為推挽之推土囘切摶本摶攝之摶徒端切而為摶束之摶除轉切禮百羽為摶獻本獻享之獻而為獻尊之獻素何切衰本雨衣之衰素何切而為衰絰之衰音崔撬本音毳以其義通於橋故又音橋凡此之類並因義借音右二十五因借而借難烏也因音借為艱難之難因艱難之難借為險難之難去聲為母猴也因音借為作為之為因作為之為借為相為之為去聲射本射御之射因義借為發射之射食亦切因發射之音借為無射之射音亦律名斁本厭斁之斁羊益切因義借為斁敗之斁多路切書彛倫攸斁因斁敗之音借為斁塈之斁音徒書惟其斁塈茨亨音享本饗也因義借為亨飪之亨普庚切因亨飪之音借為亨嘉之亨來本麥也因音借為往來之來因往來之義借為勞來之來音賚矜本矛柄也因音借為矜憐之矜因矜憐之義借為矜寡之矜音鰥適往也因音借為適責之適音謫詩勿予禍適因適責之音借為適匹之適音敵參七南切間厠也因義借為參差之參楚金切因參差之音借為參伐之參所金切邪本琅邪之邪因音借為語辭之邪因語辭之義借為虛邪之邪音徐詩其虛其邪食本啖食之食因義借為飲食之食音伺因飲食之食借為食其之食音異費本費用之費因音借為費邑之費音秘因費邑之義借費氏之費扶未切崔本南山崔崔之崔子惟切因義借為崔嵬之崔慈囘切因崔嵬之音借為崔氏之崔音催不本鄂不韡韡之不音趺因音借為可不之不音否因可不之義借為不可之不音弗填本填塞之填因義借為填壓之填音鎮因填壓之音借為填久之填音塵詩倉兄填兮罷本罷置之罷因義借為罷困之罷音疲因罷困之音借為罷辜之罷鋪逼切禮以罷辜祭四方質本質幣之質音贄因義借為交質之質音至因交質之音借為形質之質畜本田畜之畜敕六切因音借為畜養之畜許六切因畜養之義借為六畜之畜許又切治平聲水也因音借為治理之治因治理之義借為平治之治去聲乞氣也因音借為與人之乞音氣因與人之義借為求人之气入聲能奴來切獸也因義借為能龞之能三足龞因能鼈之音借為能事之能音耐又為三能之能音台凡此之類並因借而借右四十三語辭之借序曰書者象也凡有形有象者則可以為象故有其書無形無象者則不可為象故無其書語辭是也語辭之用雖多於主義不立並從假借之菌也也隂也云雲也思慮也邪琅邪之地焉鳶也惟思也既小食也盍覆也而面也須髭也蓋艸覆斯析也然燎也以薏苡實也矣箭鏃也為母猴也居蹲也且子余切薦几也諸辨也詩日居月諸耳人耳也哉言之間也兮气也爾華繁也詩彼爾維何維常之華乎气也于气也旃斾也詩舍旃舍旃乃气也於烏也己几也每本音梅原田之貌借為上聲夫本丈夫也借音扶其箕也豈鎧也員物數也音云詩聊樂我員與授也語辭借平聲承奉也音懲楚人語辭唯本上聲乃唯諾之唯借平聲害去聲災也借音曷詩害澣害否凡語辭惟哉乎兮于只乃有義他並假借以語辭之類虛言難象故因音而借焉右四十五音之借宫本宫室之宫商本商度之商角本頭角之角徴本徴召之徴羽本羽毛之羽右五三詩之借風本風䖝之風雅本烏鴉之鴉頌本顔容之容右三詩五音皆聲也聲不可象並因音而借焉右三十日之借甲本戈甲乙本魚膓丙本魚尾丁本蠆尾戊本武也己本几也庚鬲也辛被罪也壬懐妊也癸草本實也右十十二辰之借子人之子也丑手之械也寅臏也卯牖也辰未詳本義巳蛇屬也午未詳本義未木之滋也申持簡也酉卣也戌與戊戚冋意亥豕屬也十日十二辰惟己亥有義他並假借以日辰之類皆虛意難象故因音而借焉右十二方言之借鮦之為鮦音胄鮦陽縣名歜之為歜上音觸下徂感切昌歜也昌蒲也覃之為覃上如字下音剡詩以我覃耜羮之為羮上如字下音郎楚地名咎之為咎上如字下音臯臯陶字穀之為穀奴走切楚人謂乳穀枹之為枹上必茅切下音桴鼔桴也敦之為敦音燾禮每敦一几又為敦音彫詩敦弓右九雙音並義不為假借陶陶冶臯陶鵰都聊切隼類陟交切鶻鵰鴝鵒駣徒刀切馬四嵗曰駣他彫切馬三嵗曰駣鷂以照切音遙雉也杷補訝切枋也白加切收麥器榮永兵切桐也音營屋榮枸音茍枸杞音矩枳枸椹知林切禮射甲革椹實食甚切桑實也校古孝切木囚也户教切木闌也幅音福布帛之劑音逼行縢也幓所衘切旂幅也七消切頭括髪襢音袒袒裼也張彦切后六服有襢衣被部委切寢衣也普義切春秋傳翠被豹舄衿居吟切領也其鴆切結也褏音袖袂也由救切盛服也凡此之類皆是也右三十凡此借類計五百九十八論急慢聲諧急慢聲諧者慢聲為二急聲為一也梵書謂二合聲是矣梵人尚音有合二合三合四成聲者華人尚文惟存二合詩序曰聲成文謂之音知聲有急慢則發而為文抑揚合度鏗鏘中節箋釋之家全不及此至於語辭渾而無别但取言中之義不問句中之節故栁宗元極論語辭之義良繇不知急慢之節所以辭與句不相當如慢聲為者焉急聲為旃旃為者焉之應如者與之為諸而已之為耳之矣之為只者也之為者也者急聲為也嗚呼之為嗚噫嘻之為嘻皆相應之辭也論髙下聲諧音讀附董正之董亦為督察之督者東董凍督故也改更之更亦為變革之革者更梗更去聲革故也伊之為己大誥曰己予惟小子已之為億易曰億喪貝又曰億無喪有事伊巳意億故也非之為匪匪之為弗非匪沸弗故也眅即盼者攀眅盼故也儆類敬者京儆敬故也翻之為反庸之為用邪之為也之之為只者並此道也而之為爾爾之為汝汝之為若于之為於於之為與與之為與音譽亦此道也是皆一義之所起而發聲有輕重耳乃若父雖甫音讀若輔道雖杜老切讀若導禮記大昕昕音忻讀若希説文臑字音懦讀若襦咢字特一切讀若亭此為音讀之别無非聲之諧也論諧聲之惑左氏曰止戈為武武非從止凡沚芷齒耻之類從止武從戈從亾從戈見其義從亾見其聲古文歌舞之舞作􅀢振撫之撫作􅀈廊廡之廡作􅂒古並從亾今並從無於篆文亦從亾則武之從亾又何疑焉若曰武有止戈義又何必曰偃武乎亾之與止易得相紊左氏所見止之訛武於六書為諧聲武戈類也武之從亾亦猶戰之從單音善戮之從翏音六戢之從咠音緝戣之從癸皆聲之諧也禮記曰祖者且也祖非從且凡置姐之類從且徂祖之類從且音徂祖無且義凡此之類皆不識諧聲論象形之惑左氏曰反正為乏正無義也正乃射侯之正音征象其形焉正音征以受矢乏以藏矢其義在此或曰反正為丏音沔丏蔽矢短牆也正以受矢丏以蔽矢此亦反正為乏之義邪正之正無所象故正用侯正音征之正邪用琅邪之邪並協音而借是為假借之書也韓子曰自營厶音私厶非自營之義也厶於篆文作象男子之勢故又音鳥厶與同即了字故勢下垂了狀槌上並是象形之文若乃自營之厶與了絶之了並同音而借亦為假借之書疊古作曡祭肉之積在器也從宜祭器也從晶象積肉之形曡與豐同意豐亦爼豆之滿者也揚雄以曡為古理官决罪三日得其宜乃行故從三日從宜此亦為不識象形者也何用識竒字之多乎能象熊之形許氏謂能熊屬則可矣又曰賢能之能何也出象花英之形許氏謂象艸木益滋上出亦可矣又曰出進何也是皆惑象形於假借者也三代之前有左氏韓子三代之後有揚雄許慎猶不達六書之義况他人乎論子母立類為母從類為子母主形子主聲説文眼學廣韻耳學説文主母而役子廣韻主子而率母説文形也禮也廣韻聲也樂也説文以母統子廣韻以子該母説文定五百四十類為字然母能生子不能生今説文誤以子為母者二百十類且如句類生拘鉤􅓒類生㮚㮚半類生胖叛菐類生僕䑑拘當入手類鉤當入金類則句為虛設㮚當入木類㮚當入米類則􅓒為虛設胖當入肉類叛當入反類則半為虛設僕當入人類䑑當入臣類則菐為虛設葢句􅓒半菐皆子也子不能生是為虛設夾漈作象類書總三百三十母為形之主八百七十子為聲之主合千二百文而成無窮之字故去許氏二百十而取其三百三十也論變更對舊作對漢文以言多非誠故去口隋舊作隨文帝以周齊不遑寧處故去辵疊舊作曡新室以三日大盛改為三田􅚷舊作騧宋明以咼音喎類禍改而為𤓰形影之影舊作景葛稚川加彡于右軍陣之陣舊作陳王逸少去東從車尼丘之山三倉合而為音尼章貢之水後人合而為贛音紺荒昏二義元次山諡隋煬帝合而為􅀈音荒鄗火各切本一名分而為高邑者漢光武也鄚嫌近鄭更為莫豳嫌近幽更而為邠此並唐明皇所更也論遷革雅本鴉字今復有鴉字遂以雅為雅頌之雅後人不知本音雅字雇本九鳸之鳸借為雇賃之雇今復有鳸字後人不知本為雇也頌本顔容借為歌頌之頌今人見頌知為歌頌之頌而已安知本是容泉本貨錢之錢故於篆象古刀文借為泉水之泉今人見泉知為泉水之泉而已安知本為錢字徐鉉奏俗書譌謬不合六書之體者二十九字斖个暮熟捧遨迴腰嗚慾揀俸影斌悦藝著墅蓑賾黌黈麌池徘徊鞦韆矗字音正譌用説文切車尺遮切軻康我切輔扶雨切治平聲濟子禮切洗蘇典切洒先禮切溺而灼切汶亡運切浣胡玩切灑山豉切泌兵媚切漚烏候切湛宅減切沲徒河切儷平聲譔此縁切謾母官切訂他頂切誖蒲没切它託何切柩巨救切恃時止切鋪普胡切錢即淺切蕩徒朗切頃去營切峙直离切婢便俾切婦房九切母莫后切靄于蓋切掃蘇老切在昨代切燠烏到切煖况袁切罷薄蟹切陛旁禮切附符又切酢倉故切醋在各切打都捉切擠子計切挂古賣切摘他歴切搦尼革切唯以水切夀直繇切啞于革切趨直离切料洛蕭切事鉏史切賈公户切号胡到切號乎刀切核古哀切槧自琰切梭私閏切盻胡計切散蘇旰切盼匹莧切腥蘇佞切篰簿口切霸普伯切孛蒲妹切曾昨稜切過古禾切造七到切紹市沼切緯云貴切紂上聲繆平聲館古玩切劾胡槩切草自葆切予余吕切能奴來切示音祈豈苦亥切弟特計切探它含切懦人朱切鬌直追切􅆋以冉切扣苦后切不方久切負房九切旱乎旰切暵呼旰切統去聲篠徒弔切聚才句切噫于介切紊亡運切簟徒念切徯胡計切尿奴弔切嗌伊昔切副芳逼切假古頟切泉古錢切創楚良切作瘡非㨔胡感切作撼非婹奴困切作嫩非部位雜記折艸部卒衣部皁古草為皁嗟言部薝於古文鳥字苻合從竹朞即期字叩元扣砠元從山服元從舟柴㧘拒本歫字止部糕説文從禾玉篇從禾從示莵説文作䖘虎部葸説文無玉篇有妙本玅説文在弦部玉篇玅部乞古乞字借入聲㸃畫譌舛卜卜角壺壷令令玉玉王王争爭節節攵攴在在旡无毌毋梁梁倉倉􅁤軌覀㓂寇叚段清淸亡亾嵗歲卯丣酉深㴱稽縣縣既旣為爲􅁰黍榖穀吴吳黄黃用甪之之周周殷殷哉哉􅆹􅆹朱子答楊元範有云大有亨享二字據説文只是一字故易中多互用亨如王用亨于岐山亦當為享如王用享於帝之云也字書音韻是經中淺事故先儒得其大者多不留意然不知如此等處不理㑹却枉費了無限辭説牽補而卒不得其本義亦甚害事也非但易學凡經之説無不如此獨恨早衰無精力整頓得耳字學説文爾雅字説字林三蒼呉楚音辨吕靖韻集夏侯該韻畧楊休之韻畧周思言音韻李季節音譜杜臺卿韻畧玉篇唐韻丁度集韻唐藝文志音隠音畧音義音訓音鈔釋音辨證辨疑辨嫌辨惑辨字注辨論字説三顧隠客蕭楚字子荆號清節先生象形日從口從一陽數月有盈虧從日而闕之從二而反隂數遡於陽而不得其正也田象四口十阡陌之制卜象龜兆從横古冊從五畫直下象其枚數有聨綴王氏只以字為象形非也乃氣生出之難公羊曰乃難辭也􅋄象物初出有枝莖指事直著其事視而可知也人目為見鼻臭為齅兩户相向為門兩手丅為拜丅古下字土木示為􅀈古社字矢耳為聅以矢貫耳刀耳為刵王居門為閏㑹意合文以成其義言欲其順故口􅀢音愆為言􅀢從二古上字從干為􅀢口為言止戈為武力田為男女帚為婦人言為信人為為偽吏於人為使反於后為司后口為㖃諧聲本一字以定其體而附他字以諧其聲江河鵝鴨江河左從水以定其體而諧聲在右鵝鴨右從鳥以定其體而諧聲在左裠裳諧聲在上簾箔諧聲在下園圃諧聲在内徽輿諧聲在外徽三糾繩也故從糸從微省聲若江河以工可字諧聲者取其聲之同母字也及草之類從艸木之類從木金之類從金土之類從土而附他字以諧聲者是轉注同意相受考老字是此説非也古之人於文有解釋其意義謂之轉注者本一字更有意義可轉用也有一轉為二聲用者有再轉為三聲用者有至四聲而皆有義者長本長久字長則物莫先焉故又為長幼之長長則有餘故又為長物之長行本行止字行則有縱跡故又為徳行之行行則有次序故為周行之行又子路行行之行無義也以聲相近而用之假借也齊整齊也人意專一則齊音齋如故為齊戒之齊齊則適等無過不及有調適之意故為酒齊刀劍齊之齊令又為使令之令乾卦名陽也故為乾熯之乾數一二之名有數則可數故又為數往之數有數則宻矣故又為疎數之數又音促數􅅈亦宻􅅈也亦轉注也凡此之類皆聲轉而各有義故曰轉注又有本其意特轉聲用之者以女為人妻謂之妻以女妻人曰女指所載之物統曰載昨代切不輸爾載如此類本皆無其字時人有是語故原其意轉聲而用也此類字不為假借者本其意故也假借本無其事原它字聲意而借用之亦有只借聲而用之者先儒謂令長字是非也能本獸之軼材者賢能之能借用之豪本獸之威猛者豪傑之豪借用之俗作毫非正如碧是碧玉之碧玉之碧色者萇𢎞血化為碧故碧從石用為碧色之碧與此正同皆假借也震辟歴也動物亦物之所懼故為地震之震又為震來􅊒􅊒之震須髭也鬚無實用不可無故為須待之須又為須用之須此類并其聲意借用之也旃古人止語思語始卒之辭旃旗也指揮之用也故旃為指物之辭詩曰舍旃舍此也思屬土五行成於土五事成於思故思為語始卒之辭思樂泮水始語也不可度思卒語也此類亦當時有是語故為文者原其字意亦因其聲而用之也不然旃旟皆旗何獨取於旃思私同音何獨取於思尊尊彛也又為尊卑之尊即酒尊字古者大酋主酒周官用此後人始有從木從缶以尊或有瓦木也如刑鼎古人亦用刑字後人始用鉶雅禽也俗作鴉又為風雅之雅古疋字如此象獸也又為彖象之象此類只借其聲用之也以冰為掤也所以覆矢可以飲抑釋冰忌古人通冰字以麋為湄居河之麋水草荒穢處以來為䅘來牟先儒謂來本瑞麥天所來故用往來之來非也周以前有來字易以盍為合以羸為纍此類亦借其聲而已於字無義也又以定為顁麟之定顁定古人通用常為棠棠棣借為常害為曷害澣彭為旁匪其彭居為其何居此類皆古人因其聲相近而借用之於字亦無義也所謂六書之體可考見者如此豈盡是㑹意字字可説哉爾雅飛類謂之雌雄走類謂之牝牡故雌雄字從佳羽族也鳥短尾總名隹牝牡字從牛毛屬也書以越字為始語詩以侯字維字為始語楚辭以蹇字羌字為始語易以若字如字為止語之辭詩以只字且字為止語楚辭則些字又日居月諸叔善射忌音既聊樂我員音云皆當時之語為文者借字聲而用之今所傳六經之文有異於漢儒所傳之文營營青蠅作謍謍勿拜作扒拔也噬肯作逝肯衣裳音楚五色鮮明桃之枖枖平豑東作西伯黎皋陶臯顛木有甹枿甹木再生條也後人傳寫脱􅝟字遂作由説者云由枿非也當作甹見説文我興受其䢙旁逑孱功是今文有非漢儒所傳之文漢儒所傳之文非孔子之文欲字字而解之可乎而毛類冬官作其鱗之而訓如孟子而未之見左傳若而人又訓汝而翁又為止語殆而敦五音五義音團聚也詩有敦瓜苦音彫與弴同弓也音對器也左傳珠盤玉敦又音頓嵗在酉曰困敦又都昆切厚也思念也又為于思之思桑才切今作䰄多髯也洚四音一義音洪音缸音閧音絳皆水不遵道也甗三音一義言又上聲去聲皆甑名也穀書方穀訓禄詩穀則異室訓生穀旦訓善薰香草葷臭同一音古文以赤為尺桼為七皆是借聲用字古易羝羊觸藩纍其角糸纍不能進纍其瓶之義亦然糸纍其瓶故致傾覆不能上水今之説者未見古本又如以盍為合彭為旁繻為濡疑皆傳録之誤繻有衣袽當作濡一二三四五六七八九十演而申之至于不可窮詰凡天地之運行四時之代謝日月星辰之進退九州萬物之繁夥果不逃其數可以窮變化而行鬼神功用抑大矣世人皆云蒼頡所造而曾不究其㫖方伏羲畫卦時仰則觀天而畫一俯則觀地而畫二中則觀人而畫三觀四方而得四觀天地之氣交午而得五以至六七八九十亦莫不然始於三畫分為八卦九六藏於其中則知此十字非伏羲畫卦時為之不可蒼頡但能因此而字之如人之字育為之滋長變出他文學者當細考之不可以常字觀近王荆公留心字學皆為之解釋至此十字却無贊辭要之如日月星辰十干十二支金木水火土首目口耳手足山石蟲鳥等正字非聖人不可作蒼頡體其意以從偏傍而字之耳雲麓謾鈔正始之音畢朱子學校貢舉私議古者學校選舉之法始於鄉黨而達於國都教之以徳行道藝而興其賢者能者葢其所以居之者無異處所以官之者無異術所以取之者無異路是以士有定志而無外慕蚤夜孜孜唯懼徳業之不修而不憂爵禄之未至夫子所謂言寡尤行寡悔禄在其中孟子所謂修其天爵而人爵從之葢謂此也若夫三代之教藝為最下然皆猶有實用而不可闕其為法制之密又足以為治心養氣之助而進於道徳之歸此古之為法所以能成人材而厚風俗濟世務而興太平也今之為法不然雖有鄉舉而其取人之額不均又設太學利誘之一塗監試漕試附試詐冒之捷徑以啟其奔趨流浪之意其所以教者既不本於徳行之實而所謂藝者又皆無用之空言至於甚弊則其所謂空言者又皆怪妄無稽而適足以敗壊學者之心志是以人材日衰風俗日薄朝廷州縣每有一事之可疑則公卿大夫官人百吏愕眙相顧而不知所出是亦可驗其為教之得失矣而議者不知其病源之所在以程試文字之不工為患而唱為混補之説以益其弊或者知其不可又欲斟酌舉行崇寧州縣三舍之法而使嵗貢選士於太學其説雖若賢於混補之云然果行此則士之求入乎州學者必衆而今州郡之學錢糧有限將廣其額則食不足將仍其舊則其勢之偏選之艱而塗之狹又將有甚於前日之解額少而無所容也正使有以處之然使游其間者校計得失於旦暮錙銖之間不得寧息是又不唯無益而損莫大焉亦非計之得也葢嘗思之必欲乘時改制以漸復先王之舊而善今日之俗則必如明道先生熈寧之議然後可以大正其本而盡革其末流之弊如曰未暇則莫若且均諸州之解額以定其志立徳行之科以厚其本去罷詞賦而分諸經子史時務之年以齊其業又使治經者必守家法命題者必依章句答義者必通貫經文條舉衆説而斷以己意學校則遴選實有道徳之人使專教導以來實學之士裁減解額舍選謬濫之恩以塞利誘之塗至于制科詞科武舉之屬亦皆究其利病而頗更其制則士有定志而無奔競之風有實行而無空言之弊有實學而無不可用之材矣此其大畧也其詳則繼此而遂陳之夫所以必均諸州之解額者今之士子不安於鄉舉而爭趨太學試者以其本州解額窄而試者多太學解額濶而試者少本州只有解試一路太學則兼有舍選之捷徑又可以智巧而經營也所以今日倡為混補之説者多是溫福處婺之人而它州不與焉非此數州之人獨多躁競而它州之人無不亷退也乃其勢驅之有不得不然者耳然則今日欲救其弊而不以大均解額為先務雖有良法豈能有所補哉故莫若先令禮部取逐州三舉終塲人數太學終塲人數解試亦合分還諸州通為人數通比舊額都數定以若干分為率而取其若干以為新額如以十分為率而取其一則萬人終塲者以百人為額更斟酌之又損太學解額舍選取人分數使與諸州不至大段殊絶其見住學人分數權許仍舊則士安其土而無奔趨流浪之意矣所以必立徳行之科者徳行之於人大矣然其實則皆人性所固有人道所當為以其得之於心故謂之徳以其行之於身故謂之行非故有所作為増益而欲為觀聽之美也士誠知用力於此則不唯可以修身而推之可以治人又可以及夫天下國家故古之教者莫不以是為先若舜之命司徒以敷五教命典樂教胄子皆此意也至於成周而法始大備故其人材之盛風俗之美後世莫能及之漢室之初尚有遺法其選舉之目必以敬長上順鄉里肅政教出入不悖所聞為稱首魏晉以來雖不及古然其九品中正之法猶為近之及至隋唐遂專以文詞取士而尚徳之舉不復見矣積至於今流弊已極其勢不可以不變而欲變之又不可不以其漸故今莫若且以逐州新定解額之半而又折其半以為徳行之科如解額百人則以二十五人為徳行科葢法行之初恐考察未精故且取其半而又減其半其餘五十人自依常法明立所舉徳行之目如八行之類專委逐縣令佐從實搜訪於省試後保明發遣赴州守倅審實保明申部於當年六月以前以禮發遣限本年内到部撥入太學於近上齋舍安排而優其廩給仍免課試長貳以時延請詢考至次年終以次差充大小職事又次年終擇其尤異者特薦補官餘令特赴明年省試比之餘人倍其取人分數如餘人二十取一則此科十而取一葢解額中已減其半矣殿試各升一甲其不中人且令住學以俟後舉其行義有虧學術無取舉者亦當議罰則士知實行之可貴而不專事於空言矣所以必罷詩賦者空言本非所以教人不足以得士而詩賦又空言之尤者其無與設教取士章章明矣然熙寧罷之而議者不以為是者非罷詩賦之不善乃專主王氏經義之不善也故元祐初議有改革而司馬溫公吕申公皆不欲復其欲復之者唯劉摯為最力然不過以考校之難而為言耳是其識之卑而説之陋豈足與議先王教學官人之本意哉今當直罷無可疑者如以習之者衆未欲遽罷則限以三舉而遞損其取人之數俟其為之者少而後罷之則亦不駭於俗而其弊可革矣所以必分諸經子史時務之年者古者大學之教以格物致知為先而其考校之法又以九年知類通達强立不反為大成葢天下之事皆學者所當知而其理之載於經者則各有所主而不能通也况今樂經亡而禮經缺二戴之記已非正經而又廢其一焉葢經之所以為教者已不能備而治之者類皆舍其所難而就其所易僅窺其一而不及其餘則於天下之事宜有不能盡通其理者矣若諸子之學同出於聖人各有所長而不能無所短其長者固不可以不學而其所短亦不可以不辨也至於諸史則該古今興亡治亂得失之變時務之大者如禮樂制度天文地理兵謀刑法之屬亦皆當世所須而不可闕皆不可以不之習然欲其一旦而盡通則其勢將有所不能而卒至於不行若合所當讀之書而分之以年使天下之士各以三年而共通其三四之一則亦若無甚難者故今欲以易詩書為一科而子年午年試之周禮儀禮及二戴之禮為一科而卯年試之春秋及三傳為一科而酉年試之年分皆以省試為界義各二道諸經皆兼大學論語孟子中庸義各一道論則分諸子為四科而分年以附焉諸子則如荀楊王韓老莊之屬及本朝諸家文字當别討論分定年數兼許於當年省試中出論二道策則諸史時務亦然諸史則左傳國語史記兩漢為一科三國晉書南北史為一科新舊唐書五代史為一科通鑑為一科時務則律厯地理一科通禮新儀為一科以次分年如經子之法䇿各二道則士無不通之經無不習之史而皆可為當世之用矣其治經必專家法者天下之理固不外於人之一心然聖賢之言則有淵奥爾雅而不可以臆斷者其制度名物行事本末又非今日之見聞所能及也故治經者必因先儒已成之説而推之借曰未必盡是亦當究其所以得失之故而後可以反求諸心而正其繆此漢之諸儒所以專門名家各守師説而不敢輕有變焉者也但其守之太拘而不能精思明辨以求真是則為病耳然以此之故當時風俗終是淳厚近年以來習俗茍偷學無宗主治經者不復讀其經之本文與夫先儒之傳注但取近時科舉中選之文諷誦摹倣擇取經中可為題目之句以意扭揑妄作主張明知不是經意但取便於行文不暇恤也葢諸經皆然而春秋為尤甚主司不惟不知其繆乃反以為工而置之髙等習以成風轉相祖述慢侮聖言日以益甚名為治經而實為經學之賊號為作文而實為文字之妖不可坐視而不之正也今欲正之莫若討論諸經之説各立家法而皆以註疏為主如易則兼取胡瑗石介歐陽修王安石邵雍程頤張載吕大臨楊時書則兼取劉敞王安石蘇軾程頤楊時晁説之葉夢得呉棫薛季宣吕祖謙詩則兼取歐陽修蘇軾程頤張載王安石吕大臨楊時吕祖謙周禮則劉敞王安石楊時儀禮則劉敞二戴禮記則劉敞程頤張載吕大臨春秋則啖助趙匡陸淳孫明復劉敞程頤胡安國大學論語中庸孟子則又皆有集解等書而蘇軾王雱呉棫胡寅等説亦可采以上諸家更加考訂増損如劉彛等説恐亦可取令應舉人各占兩家以上於家狀内及經義卷子第一行内一般聲説將來答義則以本説為主而旁通他説以辨其是非則治經者不敢妄牽己意而必有据依矣其命題所以必依章句者今日治經者既無家法其穿鑿之弊已不可勝言矣而主司命題又多為新竒以求出於舉子之所不意於所當斷而反連之於所當連而反斷之大抵務欲無理可解無説可通以觀其倉卒之間趨附離合之巧其始葢出於省試上天之載無聲無臭儀刑文王之一題然而當時傳聞猶以為怪及今數年則無題不然而人亦不之怪矣主司既以此倡之舉子亦以此和之平居講習專務裁剪經文巧為餖飣以求合乎主司之意其為經學賊中之賊文字妖中之妖又不止於家法之不立而已也今既各立家法則此弊勢當自革然恐主司習熟見聞尚仍故態却使舉子愈有拘碍不容下筆願下諸路漕司戒勅所差考試官今後出題須依章句不得妄有附益裁剪如有故違許應舉人依經直答以駁其繆仍經本州及漕司陳訴將命題人重作行遣其諸州申到題目亦令禮部國子監長貳看詳紏舉譴罰則主司不敢妄出怪題而諸生得守家法無復敢肆妖言矣又按前賢文集策問皆指事設疑據實而問多不過百十字嘉祐治平以前尚存舊體而吕申公家傳記熙寧事乃云有司發策問必先稱頌時政對者因大為諛詞以應之然則此風葢未逺也今亦宜為之禁使但條陳所問之疑畧如韓歐諸集之為者則亦可以觀士子之實學而息其䛕佞之姦心矣其必使答義者通貫經文條陳衆説而㫁以己意者其説已畧具於家法之條矣葢今日經學之難不在於治經而難於作義大抵不問題之小大長短而必欲分為兩段仍作兩句對偶破題又須借用它語以暗貼題中之字必極於工巧而後已其後多者三二千言别無它意不過止是反復敷衍破題兩句之説而已如此不唯不成經學亦復不成文字而使學者卒嵗窮年枉費日力以從事於其間甚可惜也欲革其弊當更寫卷之式明著問目之文而疏其上下文通約三十字以上次列所治之説而論其意又次旁列它説而以己意反復辨析以求至當之歸但令直見聖賢本意與其施用之實不必如今日經義分段破題對偶敷衍之體每道止限五六百字以上則雖多増所治之經而答義不至枉費辭説日力亦有餘矣至於舊例經義禁引史傳乃王氏末流之弊而論子史者不復訂以經指又俗學卑近之失皆當有以正之使治經術者通古今議論者識原本則庶乎其學之至矣其學校必選實有道徳之人使為學者師以來實學之士裁減解額舍選謬濫之恩以塞利誘之塗夫古之太學主於教人而因以取士故士之來者為義而不為利且以本朝之事言之如李薦所記元祐侍講吕希哲之言曰仁宗之時太學之法寛簡國子先生必求天下賢士真可為人師者就其中又擇其尤賢者如胡翼之之徒使專教導規矩之事故當是時天下之士不逺萬里來就師之其游太學者端為道藝稱弟子者中心説而誠服之葢猶有古法之遺意也熙寧以來此法浸壊所謂太學者但為聲利之塲而掌其教事者不過取其善為科舉之文而嘗得儁於塲屋者耳士之有志於義理者既無所求於學其奔趨輻輳而來者不過為解額之濫舍選之私而已師生相視漠然如行路之人間相與言亦未嘗開之以徳行道藝之實而月書季考者又秪以促其嗜利茍得冒昩無恥之心殊非國家之所以立學教人之本意也欲革其弊莫若一遵仁皇之制擇士之有道徳可為人師者以為學官而久其任使之講明道義以教訓其學者而又痛減解額之濫以還諸州罷去舍選之法而使為之師者考察諸州所解徳行之士與諸生之賢者而特命以官則太學之教不為虛設而彼懐利干進之流自無所為而至矣如此則待補之法固可罷去而混補者又必使與諸州科舉同日引試則彼有鄉舉之可望者自不復來而不患其紛冗矣至於取人之數則又嚴為之額而許其補中之人從上幾分特赴省試則其舍鄉舉而來赴補者亦不為甚失職矣其餘監試漕試附試之類亦當痛減分數嚴立告賞以絶其冒濫其諸州教官亦以徳行人充而責以教導之實則州縣之學亦稍知義理之教而不但為科舉之學矣至於制舉名為賢良方正而其實但得記誦文詞之士其所投進詞業亦皆無用之空言而程試論策則又僅同覆射兒戲初無益於治道但為仕宦之捷徑而已詞科則又習於諂諛夸大之詞而競於駢儷刻雕之巧尤非所以為教至於武舉則其弊又不異於儒學之陋也欲革其弊則制科當詔舉者不取其記誦文辭而取其行義器識罷去詞業六論而直使待對於廷訪以時務之要而不窮以隠僻難知之事詞科則當稍更其文字之體使以深厚簡嚴為主而以能辨析利害敷陳法度為工武舉則亦使學官放經義論策之制參酌定議頒下武經總要等書而更加討論補其遺逸使之誦習而立其科焉則庶乎小大之材各得有所成就而不為俗學之所病矣夫如是是以教明於上俗美於下先王之道得以復明於世而其遺風餘韻又將有以及於方來與夫規規然固守末流之弊法而但欲小變一二於其間者利害相絶固有間矣草茅之慮偶及於此故敢私記其説以為當路之君子其或將有取焉朱子調息箴鼻端有白我其觀之隨時隨處容與猗移靜極而嘘如春沼魚動已而吸如百蟲蟄氤氳開闔其妙無窮孰其尸之不宰之功雲卧天行非予敢議守一處和千二百嵗按雙峯語録云門人問涵養之道須用敬否曰固是如此但工夫熟時亦不用説敬只是纔靜便存而今初學却須把敬來作一件事常常持守久之而熟則忘其為敬矣問明道教人且靜坐是如何曰此亦為初學而言葢他從紛擾中來此心不定如野馬然如何便做得功夫故教它靜坐待此心寧後却做功夫然亦非教它終只靜坐也故下且字先生因言調息箴亦不可無如釋氏之念佛號道家之數息皆是要收此心使之專一在此若此心不存則數珠之數數息之數皆差了調息亦然人心不定者其鼻息之嘘氣常長吸氣常短故須有以調之息數亭匀則心亦漸定調息又勝數息明甫見勉齋説性者萬物之一原明甫曰在廬山時饒師魯曽如此説來勉齋曰是它這事物靜了看得如此須是靜方看得道理出廬山諸人如蔡元思胡伯量輩皆不肯於此著功見某有時靜坐諸公皆見攻以為學禪雖宏齋亦不能不以為慮也調看道理須是涵養若此心不得其正如何看得出息箴亦不可無葢心固氣之帥然亦當持其志無暴其氣也饒雙峯語録云下學上達意在言表程子此語葢為讀書者言讀書是下學之一事葢凡下學者皆可以上達但恐下學得不是則不能上達耳且如讀書則聖人所以作經之意是上面一層事其言語則只是下面一層事所以謂之意在言表若讀書而能求其意則繇辭以通理而可上達若但溺心於章句訓詁之間不能玩其意之所以然則是徒事於言語文辭而已决不能通其理也程子曰玩其辭不得其意者有矣又曰前儒述意以傳言後學誦言而忘味此皆下學得不是而無繇上達者也問夫子所謂下學兼知行否曰夫子此章只説知惟程子引此以釋忠恕違道不逺曰斯下學上達之義却是兼知行説問或問云上達而與天為一是知行俱到能如此否曰與天為一亦以知言方其未上達時與天隔幾重在及其既已上達則吾心即天天即吾心但聖人之上達與學者之上達有遲速之不同聖人才學便達學者則今日格一物明日格一物久後方貫通集慶路江東書院講義端禮竊聞之朱子曰為學之道莫先於窮理窮理之要必在於讀書讀書之法莫貴乎循序而致精而致精之本則又在於居敬而持志此不易之理也其門人與私淑之徒㑹稡朱子平日之訓而節取其要定為讀書法六條曰循序漸進曰熟讀精思曰虛心涵泳曰切己體察曰著緊用力曰居敬持志其所謂循序漸進者朱子曰以二書言之則通一書而後及一書以一書言之篇章句字首尾次第亦各有序而不可亂也量力所至而謹守之字求其訓句索其㫖未得乎前則不敢求乎後未通乎此則不敢志乎彼如是則志定理明而無疎易凌躐之患矣若奔程趂限一向趲看了則看猶不看也近方覺此病痛不是小事元來道學不明不是上面欠工夫乃是下面無根脚其循序漸進之説如此所謂熟讀精思者朱子曰荀子説誦數以貫之見得古人誦書亦記徧數乃知横渠教人讀書必須成誦真道學第一義徧數已足而未成誦必欲成誦徧數未足雖已成誦必滿徧數但百徧時自是强五十徧時二百徧時自是强一百徧時今所以記不得説不去心下若存若亡皆是不精不熟之患今人所以不如古人處只爭這些子學者觀書讀得正文記得註解成誦精熟註中訓釋文意事物名件發明相穿紐處一一認得如自己做出來底一般方能玩味反覆向上有通透處若不如此只是虛設議論非為己之學也其熟讀精思之説如此所謂虛心涵泳者朱子曰莊子説吾與之虛而委蛇既虛了又要隨他曲折去讀書須是虛心方得聖賢説一字是一字自家只平着心去秤停他都使不得一毫杜撰學者看文字不必自立説只記前賢與諸家説便了今人讀書多是心下先有箇意思了却将聖賢言語來凑他底意思其有不合便穿鑿之使合其虛心涵泳之説如此所謂切己體察者朱子曰入道之門是將自己箇身入那道理中去漸漸相親與己為一而今人道在這裏自家在外元不相干學者讀書須要將聖賢言語體之於身如克己復禮如出門如見大賓等事須就自家身上體覆我實能克己復禮主敬行恕否件件如此方有益其切己體察之説如此所謂着緊用力者朱子曰寛着期限緊着課程為學要剛毅果决悠悠不濟事且如發憤忘食樂以忘憂是甚麽精神甚麽骨肋今之學者全不曽發憤直要抖擻精神如救火治病然如撑上水船一篙不可放緩其着緊用力之説如此所謂居敬持志者朱子曰程先生云涵養須用敬進學則在致知此最精要方無事時敬以自持凡心不可放入無何有之鄉須是收斂在此及應事時敬於應事讀書時敬於讀書便自然該貫動靜心無不在今學者説書多是捻合來説却不詳密活熟此病不是説書上病乃是心上病葢心不專靜純一故思慮不精明須要養得虛明專靜使道理從裏面流出方好其居敬持志之説如此愚按此六條者乃朱子教人讀書之要故其誨學者告君上舉不出此而自謂其為平日艱難已試之效者也竊嘗論之自孔子有博學於文約之以禮亦可以弗畔矣夫之訓以顔子之善學其贊孔子循循善誘亦不過曰博我以文約我以禮而已是孔子之教顔子之學不越乎博文約禮二事豈非以學者捨是無以為用力之地歟葢盈天地間萬物萬事莫非文也其文出於聖人之手而存之於書者載道為尤顯故觀孔子責子路何必讀書然後為學之語可為深戒豈非讀書為博文之大而急者歟朱子曰約禮則只是這些子博文各有次序當以大而急者為先葢謂是也然則博文豈可不以讀書為先而讀書又豈可不守朱子之法朱子平日教人千言萬語總而言之不越乎此六條而六條者總而言之又不越乎熟讀精思切己體察之兩條葢熟讀精思即博文之功而切己體察即約禮之事然則欲學顔子之學者豈可不由是而求之哉今幸其説具存學者讀書能循是六者以實用其力則何道之不可進何聖賢之不可為使朱子復生身登其門耳聞其誨未必若是之詳且要也學者可不自知其幸歟世之讀書其怠忽間斷者固不足論其終日勤勞貪多務廣終身無得者葢以讀之不知法故也惟精廬初建端禮荒陋匪材夫豈其任承乏之初敢以朱子讀書法首與同志講之期相與確守焉以求共學之益使他日義精仁熟賢材軰出則朱子之訓不為虛語精廬不為虛設顧不美歟存存齋銘性與天道夫程端禮子罕言于易乃言成性存存知禮畢具惟性之成無異愚賢天予其全心統性情性體惟靜曰惟存心心乘氣機所以存性存之斯正其方伊何在乎主敬無間無雜其效伊何始曰存存動靜皆定虛聞靜一細微紏紛勉强安行弗謹弗養聖賢是分千里其奔效天法地道義之門右讀書分年日程余守此與友朋共讀嵗嵗刪修遂與崇徳呉氏義塾台州路學平江甫里書院陸氏池州建徳縣學友朋馮彦思所刋及集慶江東書院友朋安西髙郵六合江浙友朋所鈔及定安劉謙父所刋舊本不同此則最後刋於家塾本也覽者儻矜其愚補其所未及實深望焉元統三年十一月朔程端禮書於甬東之思勉齋讀書分年日程卷三
