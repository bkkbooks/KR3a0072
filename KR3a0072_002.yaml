  - {type: page-break, offset: 0, content: '', id: KR3a0072_WYG_002-1a, image: WYG0709/WYG0709-0481a.png}
body:
  text: 讀書分年日程巻二元程端禮撰四書本經既明之後自此日㸔史仍五日内専分二日倍温玩索四書經註或問本經𫝊註倍温諸經正文夜間讀看玩索温看性理書並如前法為學之法自合接續明經今以其學文不可過遲遂次讀史次讀韓文次讀離騷次學作文然後以序明諸經覽者詳焉看通鑑看通鑑及參綱目兩漢以上參看史記漢書唐參唐書范氏唐鑑看取一卷或半巻隨宜增减四書既明胸中已有權度自此何書不可看雖不必如讀經之徧數亦虚心反覆熟看至於一事之始末一人之姓名爵里諡號世系皆當子細考求彊記又須分項詳看如當時君臣心徳之明暗治道之得失紀綱之修廢制度之因革國本之虚實天命人心之離合君子小人之進退刑賞之當濫國用之奢儉稅斂之輕重兵力之强弱外戚宦官之崇抑民生之休戚風俗之厚薄外夷之叛服如此等類以項目寫貼眼前以備逐項思玩當時之得失如當日所讀項目無者亦須通照前後思之如我親立其朝身任其事每事以我得於四書者照之思其得失合如何論㫁合如何區處有所得與合記者用册隨鈔然後參諸儒論㫁管見綱目凡例尹氏發明金仁山通鑑前編胡庭芳古今通要之類以驗學識之淺深不可先看他人議論如矮人看塲無益然亦不可先立主意不虛心也諸儒好議論亦須記仍看通鑑釋文正其音讀看畢又通三五日前者看一徧一分日倍温玩索四書經註或問本經𫝊註及諸經正文夜間讀看玩索温看性理書並如前法通鑑畢次讀韓文讀韓文文法原於孟子經史但韓文成幅尺間架耳先鈔讀西山文章正宗内韓文議論叙事兩體華實兼者七十餘篇要認此兩體分明後最得力正以朱子考異表以所廣謝疉山批㸃篇法章法句法字法備見自熟讀一篇或兩篇亦須百徧成誦緣一生靠此為作文骨子故也既讀之後須反覆詳㸔每篇先看主意以識一篇之綱領次看其叙述抑揚輕重運意轉換演證開闔闗鍵首腹結末詳畧淺深次序既於大段中看篇法又於大段中分小段看章法又於章法中看句法句法中看字法則作者之心不能逃矣譬之於樹通看則繇根至表幹生枝枝生華葉大小次第相生而為樹又折一幹一枝看則又皆各自有枝幹華葉猶一樹然未嘗毫髪雜亂此可以識文法矣看他文皆當如此看久之自㑹得法今日學文能如此看則他日作文能如此作亦自能如此改矣然又當知有法而無法無法而有法有法者篇篇皆有法也無法者篇篇法各不同也所以然者如化工賦物皆自然而然非區區模擬所致有意於為文已落第二義在我經史熟析理精有學有識有才又能集義以養氣是皆有以為文章之根本矣不作則已作則沛然矣第以欲求其言語之工不得不如此讀看耳非曰止步驟此而能作文也果能如此工程讀書將見突過退之何止肩之而已且如朱子或問及集中文字皆是用歐曾法試看歐曾曽有朱子議論否此非妄言若能如此讀書則是學天下第一等學作天下第一等文為天下第一等人在我而已未易與俗子言也自此看他文欲識文體有許多様耳此至末事一看足矣不必讀也其學作文次第詳見於後一六日内分三日倍温玩索四書經註或問本經傳註諸經正文及温看史夜間讀看玩索温看性理書如前法韓文畢次讀楚辭讀楚辭正以朱子集註詳其音讀訓義須令成誦緣靠此作古賦骨子故也自此他賦止看不必讀也其學賦次第詳見於後一分日倍溫玩索四書經註或問本經傳註諸經正文溫看史夜間讀看玩溫性理書如前法性理畢次考制度制度書多兼治道有不可分者詳見諸經註疏諸史志書通典續通典文獻通考鄭夾漈通志畧甄氏五經算術玉海山堂考索尚書中星閏法詳說林勳本政書朱子井田譜夏氏井田譜蘇氏地理指掌圖程氏禹貢圖酈道元水經註張主一地理沿革漢官考職源陸農師禮書禮圖陳祥道禮書陳晹樂書蔡氏律呂新書及辯證律凖禋典郊廟奉祀禮文吕氏兩漢菁華唐氏漢精義唐精義陳氏漢博議唐律註疏宋刑統大元通制成憲綱要說文五音韻譜字林五經文字九經字様戴氏六書考王氏正始音陸氏音義牟氏音考賈氏羣經音辯丁度集韻司馬公類篇切韻指掌圖吳氏詩補音及韻補四聲等子楊氏韻補先擇制度之大者如律厯禮樂兵刑天文地理官職賦役郊祀井田學校貢舉等分類如山堂考索所載歴代沿革考覈本末得失之後斷以朱子之意及後世大儒論議如朱子經濟文衡吕成公制度詳說每事類鈔仍畱餘紙使可續添又自為之著論此皆學者所當窮格之事以夫子之聖猶必問禮問樂而後能知豈可委之以為名物度數之細而畧之平日誠能沉潛參伍以求其故一旦在朝庶免禮官不識禮樂官不識樂之誚而和胡阮李范馬劉楊不能相一之論可决禘祫廟制可自我而定如韓子朱子矣豈特可倣源流至論及呂成公錢學士百段錦作成策段為舉業資而已通鑑韓文楚辭既看既讀之後約纔二十嵗或二十一二嵗仍以每日早飯前循環倍溫玩索四書經註或問本經傳註諸經正文溫看史溫讀韓文楚辭之外以二三年之工專力學文既有學識又知文體何文不可作學作文學文之法讀韓文法已見前既知篇法章法句法字法之正體矣然後更看全集有謝疊山批點及選看歐陽公有陳同父選者佳曾南豐類藁王臨川三家文體然後知展開間架之法緣此三家俱是歩驟韓文明暢平實學之則文體純一庶可望其成一大家數文字歐曾比韓更開闔分明運意縝宻易學而耐尋玩然其句法則漸不若韓之古朱子學之句又長矣眞西山雖亦主於明理句法還短不可不知他如栁子厚文先看西山所選叙事議論次看全集蘇明允文皆不可不看其餘諸家之文不須雜看此是自韓學下來漸要展開之法看此要識文體之佳耳其短於理處極多亦可以為理不明而不幸能文之戒如欲敘事雄深雅健可以當史筆之任當直學史記西漢書先讀眞西山文章正宗及湯東澗所選者然後熟看班馬全史此乃作紀載垂世之文不可不學後生學文先能展開滂沛後欲收斂簡古甚易若一下便學簡古後欲展開作大篇難矣若未忘塲屋欲學策以我平日得於四書者為本更守平日所學文法更畧看漢唐䇿陸宣公奏議朱子封事書疏宋名臣奏議范文正公王臨川蘇東坡萬言書策畧策别等學陳利害則得矣况性理治道制度三者已下工夫亦不患於無以答所問矣雖今日時務得失亦須詳究欲學經問直以大學中庸或問為法平日既讀四書註及讀看性理文字又不患於無本矣欲學經義亦倣或問文體用朱子貢舉私議中作義法為骨子方今科制明經以一家之說為主兼用古註疏乃是用朱子貢舉私議之說按貢舉私議云令應舉人各占两家以上將來答意則以本說為主而旁通他說以辯其是非則治經者不敢妄牽己意而必有据依矣又云使治經者必守家法命題者必依章句答義者必通貫經文條舉衆說而㫁以己意當更寫卷之式明著問目之文而疏其上下文通約三十字以上次列所治之說而論其意次又旁引他說而以己意反覆辨析以求至當之歸但令直論聖賢本意與其施用之實不必如今日分段破題對偶敷衍之體每道只限五六百字以上至於舊例經義禁引史傳乃王氏末流之弊皆當有以正之此私議之說也竊謂今之試中經義既用張庭堅體亦不得不畧倣之也考試者是亦不思之甚也張庭堅體已具冐原講證結特未如宋末所謂文妖經賊之弊耳致使累舉所取程文未嘗有一篇能盡依今制明舉所主所用所兼用之說者此皆考官不能推明設科初意預防末流輕淺虛衍之弊致使舉舉相承以中為式今日鄉試經義欲如初舉方希願禮記義者不可得矣科制明白不拘格律蓋欲學者直寫胸中所學耳奈何隂用冐原講證結格律死守而不變安得士務實學得實材為國家用而為科目增重㢤因著私論於此以待能陳於上者取焉如自朝廷議修學校敎法以輔賔興之制則此弊息矣假如書義倣張體以蔡傳之說為終篇主意如論破然如傳辭已精緊而括盡題意則就用之為起或畧而泛則以其意自做次畧衍開次入題發明以結之次原題題下再提起前綱主意歴提上下經文而歸重此題次反覆敷演或正演或反演或正引事證或反引事證繳歸主意次結或入講腹提問逐節所主之說所以釋此章之意如孔頴達疏文釋註之體逐節發明其說援引以證之繳歸主意後節如前又總論以結之如易又旁通所主次一家說又發明其異者而論㫁之又援引以證之結之次兼用註疏論其得失而斷之證之結之平日既熟讀經𫝊又不患於無本矣此亦姑言其大畧耳在作者自有活法直寫平日所得經㫖無不可者元設科條制既云作義不拘格律則自可依貢舉私議法此則㝡妙如不得已用張庭堅體亦須守𫝊註議論確實不鑿不浮可也欲學古賦讀離騷已見前更看讀楚辭後語並韓栁所作句法韻度則已得之欲得著題命意間架辭語縝宻而有議論為科舉用則當擇文選中漢魏諸賦七發及晉問熟看大率近世文章視古漸弱其運意則縝宻於前但於文選文粹文鑑觀之便見欲學古體制誥章表讀文章正宗辭命類及選看王臨川曾南豐蘇東坡汪龍溪周平園宏辭總類等體四六章表以王臨川鄧潤父曾南豐蘇東坡汪龍溪周平園陸放翁劉後村及宏辭總類為式其四六表體今縱未能盡見諸家全集選鈔亦須得舊本翰苑新書觀之則見諸家之體且并得其編定事料為用作科舉文字之法用西山法讀㸔近經問文字九日作一日讀㸔近經義文字九日作一日讀㸔古賦九日作一日讀看制誥表章九日作一日讀看策九日作一日作他文皆然文體既熟旋增作文日數大抵作文辦料識格在於平日此用剡源戴氏法及作文之日得題即放膽此用疊山謝氏法立定主意便布置間架以平日所見一筆掃就却旋改可也如此則筆力不餒作文以主意為將軍轉換開闔如行軍之必繇將軍號令句則其裨將字則其兵卒事料則其器械當使兵隨將轉所以東坡答江隂葛延之萬里徒步至儋耳求作文秘訣曰意而已作文事料散在經史子集惟意足以攝之正此之謂如通篇主意間架未定臨期逐旋摹擬用盡心力不成文矣切戒一仍以每日早飯前倍温四書經註或問本經傳註諸經正文温史夜間考索制度書温㸔性理書如前法專以二三年工學文之後纔二十二三嵗或二十四五嵗自此可以應舉矣三塲既成却旋明餘經及作古文餘經合讀合㸔諸書已見於前竊謂明四書本經必用朱子讀法必專用三年之功夜止兼㸔性理書並不得雜以他書必以讀經空眼簿日填以自程看史及學文必在三年外所作經義必盡依科制條舉所主所用所兼用之説而推明之又必擇友舉行藍田吕氏鄉約之目使徳業相勸過失相規則學者平日皆知敦尚行實惟恐得罪於鄉評則讀書不為空言而士習厚矣必若此然後可以仰稱科制經明行修鄉黨稱其孝弟朋友服其信義之實庶乎其賢材盛而治教興也豈曰小補古者大司徒以鄉三物敎萬民而賔興之未有不敎而可以賔興者方今聖朝科制明經一主程朱之説使經術理學舉業三者合一以開志道之士此誠今日學者之大幸豈漢唐宋科目所䏻企其萬一第因方今學校敎法未立不過隨其師之所知所能以之為敎為學凡讀書纔挾册開卷已凖擬作程文用則是未明道已計功未正誼已謀利其始不過因循茍且失先後本末之宜而已豈知此實儒之君子小人所繇以分其有害士習乃如此之大嗚呼先賢敎人格言大訓何乃置之無用之地哉敢私著於此以待職敎養者取焉右分年日程一用朱子之意修之如此讀書學文皆辦纔二十二三嵗或二十四五嵗若緊著課程又未必至此時也雖前所云失時失序者不過更增二三年耳大抵亦在三十嵗前皆辦也世之欲速好徑失先後本末之序雖曰讀書作文而白首無成者可以觀矣此法似乎迂濶而收可必之功如種之穫云前所云學文之後方再明一經出於不得已纔能作文之後便補一經不可遲須是手自鈔讀其諸經鈔法讀法並已見前其餘經史子集音義旁證等書别見書目今不備載惟取旁證一二日當觀省者于末卷讀經之後當看全史一過看張子邵子三胡張南軒呂東萊真西山魏鶴山程朱門人之書一過批點經書凡例館閣校勘法句讀二字側點為句中點為讀凡人名地物名并長句内小句並從中點勉齋批點四書例句讀例句舉其綱文意斷讀者也相應文意未斷覆舉上文上反言而下正上有呼下字下有承上字點抹例紅中抹一本作黄旁抹綱凡例紅旁抹警語要語紅㸃字義字眼黒抹考訂制度黑㸃補不足釋勉齋例舉其綱為句如大學之道在明明徳在親民在止於至善文意斷為句如此對小子之學言之也者也相應為讀如大學者大人之學也文意未斷為讀如言既自明其明徳又當推以及人使之亦有以去其舊染之汚也覆舉上文為讀如曰然則此篇所謂在明明徳在親民在止於至善者亦可得而聞其説之詳乎上反言而下正為讀如不親其親不長其長則所厚者薄而無以及人之親長上有呼下字為讀如中庸何為而作也子思子憂道學之失其𫝊而作也下有承上字為讀如徳者本也財者末也續補句讀例並以朱子門人以下諸儒所㸃修之一曰字是作本書者記當時對面答問之辭者並作句曰字是援引他書他日他人之言止作言字説者並無㸃有句長欲讀者寧讀於上文仍以曰字連下文一凡呼小子或二三子或參乎對面呼之而欲重其聽者皆為句一綱在上而目在下者綱為句目為讀目盡為句目在上而綱在下者諸目皆讀目盡為句綱獨為句或下是繳語解語意短急者目盡為讀一無綱之目並為讀目盡為句一無綱之目每目自有抑揚及自解者解盡為讀目盡為句如易三陳九卦則可中庸九經則不可更詳文義所宜一有綱之目每目自有抑揚及自解者解盡為讀目盡為句同前例一上段正下段反或上段反下段正短者可為讀若是長段反正有然字轉者及有大轉語辭者當為句一引用他書他人語上有所謂字下有者字急繳歸主意者所引句下者字為讀繳語盡為句一凡引他書他人他日及覆舉上文之辭者其中未盡之語為讀至所引辭盡為句如所引他書語及事實太長如孟子引齊景公晏子答問各以答問盡處為句一凡詩銘韻語以韻為句未至韻皆讀此謂特意全載者若經𫝊中引者如引書例至引盡處方為句更詳文義所宜詩經自依章句一凡議論體自然讀多句少一凡敘事體自然句多讀少意未盡者或為讀亦可一提解經文訓詁某者某也之下意盡者以也字為句如貼解本意未盡者雖也字亦為讀至意盡方為句某也下如挿見章旨者也字别為句更詳文意所宜一註文釋經訓詁就兼見章旨以義已明不再通説經文後即以大圏斷之者其中章㫖未盡小句皆讀意盡為句如止釋訓詁欲人自玩味經文者不當拘此一以言字通敘貼解一段經文大意者並讀意盡方為句亦有無言字而意實貼解段意者並同一敘論發明文義本意已盡為句其下有繳歸章㫖及别貼贊歎勸勉之辭以結者别為句一上發明所以然下以此字或是字再指上段繳歸所當然或繳歸主意者此字是字上並為句下段如文意短急者此字是字上為讀一上發明所以然下以故字繳歸所當然者故字上為讀如上是長段故字下發意又長者故字上為句一或問中問目之末何也若何而用力邪奈何亦可得而聞其説之詳乎如之何之類何也之上並讀或何也之上無者字者及短句者不讀或大段内自提問已意何者何哉何則何也之類又自發大段意者何者之上並句發音例並考許叔重説文及鄭夾漈六書畧每字有兩音者先依夾漈所正叔重之誤者餘方依叔重先正始音然後依本文音義隨四聲圏發其音義參陸氏經典釋文賈氏羣經音辨大抵依朱子為主所用㸃子以果齋史先生法取黑角牙刷柄一頭作點一頭作圏至妙凡金竹木及白角並剛燥不受朱不可用也造法先削成光圎如所欲㸃大小磨平圏子先以錐子鑽之而後刮之如所欲用丹鉊法點書用丹丹用當日新煎膠調用或揉成鋌子正誤用鉛粉凡有誤處先以墨筆改正誤處文義分明為底却以粉筆蓋之乃填寫粉上粉久必脱不如紙貼之為愈所以必須先改正分明者蓋防經久脱落欲底還可考也須以鉛粉水浸七日日日攪動待澄逼去浮水以去鉛氣待盌内乾却用當日新煎阿膠調揉為鋌子磨用凡鈔書之法亦須改正底本分明然後剪紙貼之寫浄切不可鏤去誤處為孔補貼久之脱去無文不可考矣切戒貼誤法厚齋王先生親教云平生所自用者批點韓文凡例廣疊山法議論體一句讀並依點經法一大段意盡黑畫截于此玩篇法一大段内小段紅畫截于此玩章法一小段内細節目及換易句法黄半畫截于此玩句法一論所舉所行事實及來書之目及所以作此篇之故每篇首末常式黑側抹一所論援引他書及考證及舉制度及舉前代國名青側抹一所論綱要及再舉綱要及或問體問目及提問之語及斷制之策黄側抹一義理精微之論黄中抹一凡人姓名初見者紅中抹一繳上文結上文緊切全句或發明於事實之下或先發明事之所以然於事實之上者紅側圏一轉換呼應字及用力字及繳結句内雖已用紅側圏而字合此例者每字黄側圏于此玩字法一假借字先考始音隨四聲紅圏一有韻之韻黑側圏一造句竒妙者紅側㸃一補文義不足反覆提論徳行及推說虛敘總述其所以然黒側㸃一譬喻青側㸃一要字為骨初見者黄正大圏一要字為骨再見者黄正大㸃敘事體一句讀並依㸃經法一大段意盡黑畫截篇法一大段内小段紅畫截章法一小段細節目及換易句法黄半畫截句法一敘所行事實及年號及人名爵里諡號父祖妻子兄弟等及敘所以作此篇之故銘曰詩曰及每篇首末常式黑側抹一敘教詔對答之語紅側抹一所敘引援他書及考證及舉制度及舉前代國名青側抹一所敘綱要及再舉綱要及提問之語所提問難事實雖已用黑側抹而合此例者黄側抹一義理精微之論黄中抹一凡姓名初見者紅中抹一繳上文結上文切緊全句或發明于事實之下或先發明事之所以然于事實之上者敘事此例頗少不可强求紅側圏一轉換呼應字及繳結句内雖已用紅側圏而字合此例者每字黄側圏一假借字先考字始音隨四聲紅側圏一有韻之韻黑側圏一造句竒妙者紅側㸃一反覆提論其徳行及推説其用心而虛敘總述其所以然及補文義不足黑側點一譬喻青側㸃一要字為骨初見者黄正大圏一要字為骨再見者黄正大圏刋印日程空眼簿式讀經日程詳見工程專治一書年月日生員一早令倍讀册首已讀書至昨日書一徧太長則分起止一面試倍讀昨日書一面授本日書計字數以約大段面以大段分細段令朱記段數每細段面令讀正過句讀字音面說正過文義一令每細段先看讀百徧即又倍讀百徧數足挑試倍讀倍説過而墨銷朱記後段如前段足令通作大段倍讀試過起止一挑試夜間已玩索書起止一面授説已讀書就令反覆説大義面試過起止一隻日之夜玩索已讀書起止又玩索性理書起止一雙日之夜以序倍讀凡平日已讀書一徧起止又倍讀性理書起止一令暇日倣定本㸃句讀圏發字音凡書忘記處朱記即補熟墨銷思勉齋讀看史日程年月日生員五日一周詳見工程一日以序倍讀四書經註或問一徧以序倍讀經正文夜讀看性理書并温一日以序倍讀本經傳註一徧以序倍讀經正文夜讀看性理書并溫一日看讀説記通鑑參合看史夜倣㸃史考釋文一日看讀説記通鑑參合看史夜温記史一日看讀説記通鑑參合看史夜温記史日填起止思勉齋讀看文日程年月日生員六日一周詳見工程一日以序倍讀四書經註或問一徧以序倍讀經正文夜考索制度治道書一日以序倍讀本經傳註一徧以序倍讀經正文夜考索制度治道書一日溫記通鑑以序倍讀經正文夜考索制度治道書一日讀看玩記文法溫記文法夜鈔點抹截文一日讀看玩記文法溫記文法夜鈔㸃抹截文一日讀看玩記文法溫記文法夜鈔㸃抺截文日填起止及所考所鈔思勉齋讀作舉業日程年月日生員十日一周九日讀看一日作旋增作文日一日以全日作頭塲文夜改所作日填起止及所讀看鈔㸃詳見工程思勉齋小學習字演文日程年月日生員讀經四日内分一日詳見工程一早令倍讀册首已讀書至昨日書一徧太長則分一令影寫智永千文楷書約一二十紙寫四千字易様一以已讀説小學書作口義呈改上簿一説認記字門類平仄虛實動静等一漸長學切韻考字始音偏傍音義假借等一夜以序倍讀已讀書一徧日填起止及所看所作思勉齋讀書分年日程卷二
