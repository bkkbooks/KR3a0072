  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3a0072_WYG_001-1a, image: WYG0709/WYG0709-0471a.png}
body:
  text: 讀書分年日程卷一元程端禮撰日程節目主朱子教人讀書法六條修其分年主朱子寬著期限緊著課程之說修八嵗未入學之前讀性理字訓程逄源增廣者日讀字訓綱三五段此乃朱子以孫芝老能言作性理絶句百首教之之意以此代世俗䝉求千字文最佳又以朱子童子須知貼壁於飯後行飯時使之記說一段自八嵗入學之後讀小學書正文日止讀一書自幼至長皆然此朱子苦口教人之語隨日力性資自一二百字漸增至六七百字日永年長可近千字而已每大段內必分作細段每細段必看讀百遍倍讀百遍又通倍讀二三十遍後凡讀經書倣此自此說小學書即嚴幼儀大扺小兒終日讀誦不惟困其精神且致其習為悠緩以待日暮法當才完遍數即暫歇少時復令入學如此可免二者之患日程小學大學詳小學讀經三日習字演文一日所分節目見印空眼簿必待做次卷工程方許學文一每夙興即先自倍讀已讀冊首書至昨日所讀書一遍內一日看讀內一日倍讀生處誤處記號以待夜間補正遍數其閒日看讀本為童幼文理未通誤不自知者設年十四五以上者只倍讀師標起止於日程空眼簿凡册首書爛熟無一句生誤方是工夫已到方可他日退在夜間與平日已讀書輪流倍溫乃得力如未精熟遽然退混諸書中則溫倍漸疏不得力矣宜謹之凡倍讀熟書逐字逐句要讀之緩而又緩思而又思使理與心浹朱子所謂精思所謂虛心涵泳孔子所謂溫故知新以異於記問之學者在乎此也一師試倍讀昨日書一師授本日正書假令授讀大學正文章句或問共約六七百字或一千字須多授一二十行以備次日或有故及生徒衆不得即授書可先自讀免致妨功先計字數畫定大段師記號起止於簿預令其套端禮所參館閣校勘法黃勉齊何北山王魯齊張導江及諸先生所㸃抹四書例及故王魯齊正始音等書點定本點定句讀圈發假借字音令面讀子細正過於內分作細段隨文義可斷處多不過十句少約五六句大段約千字分作十段或十一二段用朱㸃記於簿四書本惟有梅溪書院新刋纂疏字大少誤有疏文可參考集注最便初學讀誦每行二十字五十行則千字細段約四五行則得矣還案每細段讀二百遍內一百遍看讀內一百遍倍讀句句字字要分明不可太快讀須聲實如講說然句盡字重道則句完不可添虛聲致句讀不明且難足遍數他日信口難舉須用數珠或記數板子記數每細段二百遍足即以墨銷朱㸃即換讀如前盡一日之力須足六七百字日永年長可近一千字寧賸段數不可省遍數仍通大段倍讀二三十遍或止通倍讀全章正經並注或問所盡亦可必待一書畢然後方換一書並不得兼讀他書及省遍數此以朱子讀書法小學書及所訂程董學則修一師試說昨日已說書一師授說平日已讀書不必多先說小學書畢次大學畢次論語假如說小學書先令每句說通朱子本注及熊氏解及熊氏標題已通方令依傍所解字訓句意說正文字求其訓注中無者使簡韻㑹求之不可杜撰以誤人寧以俗說粗解却不妨既通說每句大義又通說每段大義即令自反覆面試覆說果通乃已久之才覺文義粗通能自說即使自看注沉潛玩索使來試說更詰難之以使之明透如說大學論語亦先令說注透然後依傍注意說正文一小學習寫字必於四日內以一日令影寫智永千文楷字如童稚初寫者先以子昻所展千文大字為格影寫一遍過却用智永如錢真字影寫每字本一紙影寫十紙止令影寫不得惜紙於空處令自寫以致走樣寧令翻紙以空處再影寫如此影寫千文足後歇讀書一二月以全日之力通影寫一千五百字添至二千三千四千字以全日之力如此寫一二月乃止必如此寫方能他日寫多運筆如飛永不走樣又使自看寫一遍其所以用千文用智永楷字皆有深意此不暇論待他年有餘力自為充廣可也蓋儒者别項工夫多故習字止如此用筆之法雙鈎懸腕讓左側右虛掌實指意前筆後此口訣也欲考字看說文字林六書略切韻指掌圖正始音韻㑹等書以求音義偏傍點畫六書之正每考三五字或十數字擇切用之字先考凡抄書之字偏傍須依說文翻楷之體骨肉間架氣象用智永非寫詩帖不得全用智永也一小學不得令日日作詩作對虛費日力今世俗之教十五嵗前不能讀記九經正文皆是此弊但令習字演文之日將已說小學書作口義以學演文每句先逐字訓之然後通解一句之意又通結一章之意相接續作去明理演文一舉兩得更令記對類單字使知虛實死活字更記類首長天永日字但臨放學時面屬一對便行使略知對偶輕重虛實足矣此正為己為人務內務外君子儒小人儒之所繇分此心先入者為主終此身不可奪不惟妨工最是奪志朱子諄諄言之切戒一隻日之夜令玩索大學已讀大學字求其訓句求其義章求其㫖每一節十數次涵泳思索以求其通又須虛心以為之本每正文一節先考索章句明透然後托章句之㫖以說上正文每句要說得精確成文鈔記㫖要又考索或問明透以參章句如遇說性理深奧精微處不計數看直要曉得記得爛熟乃止仍參看黃勉齊真西山集義通釋講義饒雙峯纂述輯講語録金仁山大學疏義語孟考證何北山王魯齊張逹善句讀批抹畫截表注音考胡雲峯四書通證趙氏纂疏集成發明等書諸說有異處標貼以待思問如引用經史先儒語及性理制度治道故事相關處必須檢尋看過凡玩索一字一句一章分看合看要析之極其精合之無不貫去了本子信口分說得出合說得出於身心體認得出方為爛熟朱子諄諄之訓先要熟讀須是正看背看左看右看看得是了未可便道是更須反覆玩味此之謂也不必多論語止看得一章二章三章足矣只要自得凡先說者要極其精通其後未說者一節易一節工夫不難矣只要記得大學畢次論語次孟子次中庸小學止令玩索小學燈火起中秋止端午或生徒多參考之書難遍及則參差雙隻夜以便之一雙日之夜倍讀凡平日已讀書一遍倍讀一二卷或三四卷隨力所至記號起止以待後夜續讀倍讀熟書必緩而又緩思而又思詳見讀册首書條凡溫書必要倍讀才放看讀永無可再倍之日前功廢矣切戒如防誤處寧以書安於案疑處正之再倍讀倍讀熟書時必須先倍讀本章正文畢以目視本章正文倍讀盡本章注文就思玩涵泳本章理趣凡倍讀訓詁時視此字正文凡倍讀通解時視此節正文此法不惟得所以釋此章之深意且免經文注文混記無别之患如倍讀忘處急用遍數補之凡已讀書一一整放在案周而復始以日程并書目揭之於壁夏夜浴後露坐無燈自可倍讀一隨雙隻日之夜附讀看玩索性理書性理畢次治道次制度如大學失時失序當補小學書者先讀小學書數段仍詳看解字字句句自要說得通透乃止小學書畢讀程氏增廣字訓綱此書銓定性理語約而義備如醫家脉訣最便初學次看北溪字義續字義次讀太極圖通書西銘並看朱子解及有何北山發揮次讀近思録看葉氏解續近思録蔡氏編見性理羣書次看讀書記大學衍義程子遺書外書經說文集周子文集張子正䝉朱子大全集語類等書或看或讀必詳玩潛思以求透徹融㑹切己體察以求自得性理緊切書目通載於此讀看者自循輕重先後之序有合記者仍分類節鈔若治道亦見西山讀書記大學衍義一以前日程依序分日定其節目寫作空眼刋定印板使生徒每人各置一簿以憑用工次日早於師前試驗親筆勾銷師復親標所授起止於簿庶日有常守心力整暇積日而月積月而嵗師生兩盡皆可自見施之學校公教尤便有司鈎鈐考察小學讀經習字演文必須分日讀經必用三日習字演文止用一日本末欲以此間讀書之日緣小學習字習演口義小文詞欲使其學開筆路有不可後者故也假如小學簿紙百張以七十五張印讀書日程以二十五張印習字演文日程可用二百日至如大學惟印讀經日程待四書本經傳注既畢作次卷工程時方印分日讀看史日程畢印分日讀看文日程畢印分日作文日程其先後次序分日輕重决不可紊人若依法讀得十餘箇簿則為大儒也孰禦他年亦須自填以自檢束則嵗月不虛擲矣今將已刋定空眼式連於次卷學者誠能刋印置簿日填功效自見也小學書畢次讀大學經𫝊正文讀書倍溫書說書習字演文如前法次讀論語正文次讀孟子正文次讀中庸正文次讀孝經刋誤讀書倍溫書說書習字演文並如前法次讀易正文六經正文依程子朱子胡氏蔡氏句讀參廖氏及古注陸氏音義賈氏音辨牟氏音考讀書倍溫書說書習字演文如前法次讀書正文次讀詩正文次讀儀禮并禮記正文次讀周禮正文次讀春秋經并三𫝊正文前自八嵗約用六七年之功則十五嵗前小學書四書諸經正文可以盡畢既每細段看讀百遍倍讀百遍又通倍大段早倍溫册首書夜以序通倍溫已讀書守此决無不熟之理自十五志學之年即當尚志為學以道為志為人以聖為志自此依朱子法讀四書注或十五嵗前用工失時失序者止從此起便讀大學章句或問仍兼補小學書讀大學章句或問一讀書倍溫書所讀字數分段看讀百遍倍讀百遍並如前法一夜間玩索倍讀已讀書玩索讀看性理書並如前法必確守朱子讀書法六條居敬持志虛心涵泳循序漸進切己體察熟讀精思著緊用力必以身任道靜存動察敬義夾持知行並進始可言學不然則不誠無物雖勤無益也朱子諭學者曰學者書不記熟讀可記義不精細思可精惟有志不立真是無著力處只如今人貪利祿而不貪道義要作貴人而不要作好人皆是志不立之病直須反覆思量究其病痛起處勇猛奮躍不復作此等人一躍躍出見得聖賢千言萬語都無一字不是實語方始立得此志就此積纍工夫迤邐向上去大有事在諸君勉旃不是小事又如程子四針朱子敬齊針西山夜氣針當熟玩體察外有天台南塘陳先生名柏字荗卿夙興夜寐針曰雞鳴而寤思慮漸馳盍于其間淡以整之或省舊愆或紬新得次第條理瞭然默識本既立矣昧爽乃興盥櫛衣冠端坐斂形提掇此心皎如出日嚴肅整齊虛明靜一乃啓方册對越聖賢夫子在坐顔曾後先聖師所言親切敬聽弟子問辨反覆參訂事至斯應則驗於為明命赫然常目在之事應既已我則如故方寸湛然凝神息慮動靜循環惟心是監靜存動察勿二勿三讀書之餘間以游泳發舒精神休養情性日暮人倦昏氣易乘齊莊正齊振拔精明夜久斯寢齊手斂足不作思維心神歸宿養以夜氣貞則復元念兹在兹日夕乾乾昔金華魯齊王先生名柏字㑹之以為此針甚切實受用以教上蔡書院諸生使之人寫一本置坐右又云養以夜氣足以證西山之誤大學章句或問畢次讀論語集注次讀孟子集注次讀中庸章句或問次鈔讀論語或問之合於集注者次鈔讀孟子或問之合於集注者次讀本經治周易鈔法一依古易十二篇勿鈔彖傳象傳附每段經文之後先手鈔四聖經𫝊正文依古易讀之别用紙依次鈔每段正文次低正文一字鈔所主朱子本義次低正文一字鈔所主程子傳其連解彖傳象傳者須截在彖傳象傳正文後鈔次低正文一字節鈔所兼用古注疏次低正文二字附節鈔陸氏音義次節鈔胡庭芳所附朱子語録文集何北山啓䝉繫辭發揮朱子孫鑑所集易遺說去其重者次低正文二字節鈔董氏所附程子語録文集次低正文三字節鈔胡庭芳所纂朱子解及胡雲峰易通及諸說精確而有裨朱子本義者其正文分段以朱子本義為主每段正文既鈔諸說仍空餘紙使可續鈔其讀易綱領及先儒諸圖及說鈔於卷首圖在啓䝉者不可移讀法其朱子本義程子傳所節古注疏並依讀四書例盡填讀經空眼簿如前法須令先讀五贊啓䝉及發揮次本義畢然後讀程子𫝊畢然後讀所節古注疏其所附鈔亦玩讀其所當讀者餘止熟看參考其程子傳古注疏與朱子本義訓詁指義同異以玩索精熟為度異者以異色筆批抹每卦作一册治尚書鈔法先手鈔全篇正文讀之别用紙鈔正文一段次低每段正文一字鈔所主蔡氏𫝊次低正文一字節鈔所兼用古注疏次低正文二字附節鈔陸氏音義次低正文二字節鈔朱子語録文集之及此段者次低正文三字節鈔金氏表注董氏所纂諸儒之說及諸說精確而有裨蔡氏𫝊者其正文分段以蔡氏𫝊為主每段正文既鈔諸說仍空餘紙使可續鈔其書序及朱子所辨附鈔每篇之末其讀書綱領及先儒諸圖鈔於首卷讀書法其蔡氏傳及所節古注疏並依讀四書例盡填讀經空眼簿如前法其所附鈔亦玩讀其所當讀者餘止熟看參考須令先讀蔡氏傳畢然後讀古注疏其古注疏與蔡氏傳訓詁指義同異以玩索精熟為度異者以異色筆批抹每篇作一冊治詩鈔法先手鈔詩全篇正文讀之别用紙鈔詩正文一章音義協音並依朱子次低正文一字鈔所主朱子傳次低正文一字節鈔所兼用古注疏次低正文二字附節鈔陸氏音義次低正文二字節鈔朱子語録文集之及此章者次低正文三字節鈔輔氏童子問及魯齊王氏詩疑辨及諸說精確而有裨朱子傳者每段正文既鈔諸說仍空餘紙使可續鈔其詩小序及朱子所辨附鈔每篇之末其讀詩綱領及先儒諸圖鈔於首卷讀法其朱子傳及所節古注疏並依讀四書例盡填讀經空眼簿如前法其所附鈔亦玩讀其所當讀者餘止熟看參考須令先讀朱子傳畢然後讀古注疏其古注疏及朱子傳訓詁指義同異以玩索精熟為度異者以異色筆批抹每篇作一册治禮記鈔法先手鈔每篇正文讀之别用紙鈔正文一段次低正文一字節鈔所用古注次低正文一字節鈔疏次低正文一字附節鈔陸氏音義次低正文一字節鈔朱子儀禮經傳通解之相關者次節鈔朱子語録文集之及此段者次低正文二字節鈔黃氏日鈔陳氏櫟詳解衛氏集解精確而有裨正經古注疏者其正文分段以古注為主每段正文既鈔諸說仍空餘紙使可續鈔蓋治禮必先讀儀禮經其讀禮記綱領及先儒諸圖及楊氏儀禮圖鈔於首卷讀法其所節古注并疏依讀四書例盡填讀經空眼簿如前法其所附鈔亦玩讀其所當讀者餘止熟看參考其古注疏之所以合於經與否以玩索精熟為度其未合者以異色筆批抹每篇作一册或二三册治春秋鈔法先手鈔正經每一年作一段讀之讀全經畢别用紙鈔當年經文一段次低經文一字節鈔所節用三傳胡氏傳諸說之合於經之本義者次低經文一字節鈔三傳胡氏𫝊諸說之未合者次低經文二字附節鈔陸氏音義次低經文二字鈔程端學所著辨疑或問凡諸說之有禆正經三傳胡氏𫝊者已詳見成書每段正文既鈔諸說仍空餘紙使可續鈔其讀春秋綱領及先儒諸圖鈔於首卷讀法凡所節三𫝊胡氏傳並依讀四書例盡填讀經空眼簿如前法其所附鈔亦玩讀其所當讀者餘止熟看參考其三傳胡氏之所以合於經與否以玩索精熟為度其未合者以異色筆批抹每年作一卷每公作一册或二三册前自十五嵗讀四書經注或問本經𫝊注性理諸書確守讀書法六條約用三四年之功晝夜專治無非為己之實學而不以一毫計功謀利之心亂之則敬義立而存飬省察之功密學者終身之大本植矣讀書分年日程卷一
